[tox]
# Test environments for Python 3.10, 3.11, 3.12, 3.13, 3.14, and 3.15
envlist =
    py{310,311,312,313}
    ruff-check
    mypy
    ruff-format
    coverage
    pip-audit
    codespell
minversion = 4.0
isolated_build = true
skip_missing_interpreters = true

# UV configuration - use tox-uv for 10-100x faster package installation
# This requires tox-uv plugin to be installed: pip install tox-uv
requires = tox-uv>=1.0.0

[testenv]
# Base test environment configuration
# Note: tox-uv automatically uses UV for faster package installation
description = Run unit and integration tests with pytest
extras = test
commands_pre =
    pytest --version
commands =
    pytest {posargs:tests/}

[testenv:py{310,311,312,313}]
# Test against specific Python versions
description = Run tests with Python {envname}
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v {posargs:tests/}

[testenv:coverage]
# Generate comprehensive test coverage reports
description = Run tests with coverage reporting
labels = test, coverage
usedevelop = true
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest \
        --cov=nhl_scrabble \
        --cov-report=term-missing:skip-covered \
        --cov-report=html \
        --cov-report=xml \
        --cov-fail-under=49 \
        {posargs:tests/}
    python -c 'import os; print("\nCoverage report: file://" + os.path.abspath("htmlcov/index.html"))'

[testenv:unit]
# Run only unit tests
description = Run unit tests only
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/unit {posargs}

[testenv:integration]
# Run only integration tests
description = Run integration tests only
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/integration -m integration {posargs}

[testenv:ruff-check]
# Linting - check code quality
description = Run linting (ruff check)
labels = lint, quality
extras = lint
commands_pre =
    ruff --version
commands =
    ruff check src tests {posargs}

[testenv:ruff-format]
# Formatting - check code style
description = Check formatting (ruff format --check)
labels = format, quality
extras = lint
commands_pre =
    ruff --version
commands =
    ruff format --check src tests {posargs}

[testenv:ruff-format-fix]
# Formatting - auto-fix code style
description = Auto-format code (ruff format + check --fix)
labels = format
extras = lint
commands_pre =
    ruff --version
commands =
    ruff format src tests {posargs}
    ruff check --fix src tests {posargs}

[testenv:mypy]
# Type checking - verify type hints
description = Run type checking (mypy)
labels = type, quality
extras = type
commands_pre =
    mypy --version
commands =
    mypy src {posargs}

[testenv:pip-audit]
# Security - scan for vulnerabilities
description = Run security audit (pip-audit)
labels = security
extras = security
commands_pre =
    pip-audit --version
commands =
    pip-audit {posargs}

[testenv:codespell]
# Spell checking - check code and documentation
description = Check spelling in code and documentation
labels = quality
skip_install = true
deps = codespell
commands_pre =
    codespell --version
commands =
    codespell {posargs:src tests docs *.md}

[testenv:check]
# Comprehensive pre-commit checks
description = Run all checks before commit (quality + tests)
labels = test
extras =
    test
    lint
    type
commands_pre =
    ruff --version
    mypy --version
    pytest --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest -v

[testenv:docs]
# Build documentation
description = Build Sphinx documentation
labels = docs
extras = docs
changedir = docs
commands_pre =
    sphinx-build --version
commands =
    sphinx-build -b html . _build/html {posargs}

[testenv:clean]
# Clean build and test artifacts
description = Remove build, test, and coverage artifacts
labels = util
skip_install = true
allowlist_externals =
    rm
    find
commands_pre =
    python --version
commands =
    rm -rf build dist .eggs *.egg-info
    rm -rf .tox .pytest_cache .mypy_cache .ruff_cache htmlcov
    rm -f .coverage coverage.xml
    find . -type d -name __pycache__ -exec rm -rf {{}} +
    find . -type f -name "*.pyc" -delete
    find . -type f -name "*.pyo" -delete

[testenv:build]
# Build distribution packages
description = Build source and wheel distributions
labels = build
skip_install = true
extras = build
commands_pre =
    python --version
    python -m build --version
commands =
    python -m build

[testenv:run]
# Run the application
description = Run the NHL Scrabble analyzer
labels = run
usedevelop = true
commands_pre =
    nhl-scrabble --version
commands =
    nhl-scrabble {posargs:analyze}

# CI/CD simulation environment
[testenv:ci]
description = Simulate CI/CD pipeline locally
labels = ci
extras =
    test
    lint
    type
    security
deps = codespell
commands_pre =
    ruff --version
    mypy --version
    pytest --version
    pip-audit --version
    codespell --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest --cov=nhl_scrabble --cov-report=term-missing --cov-fail-under=49
    pip-audit
    codespell src tests docs *.md

# Fast test environment (no coverage)
[testenv:fast]
description = Run tests quickly without coverage
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v -x {posargs:tests/}

# Watch mode for test-driven development
[testenv:watch]
description = Run tests in watch mode (requires pytest-watch)
labels = test
extras =
    test
    watch
commands_pre =
    ptw --version
commands =
    ptw -- -v {posargs}

# Publishing environments
[testenv:publish-test]
description = Publish package to TestPyPI
labels = publish
skip_install = true
extras = publish
depends = build
allowlist_externals =
    ls
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload --repository testpypi dist/* {posargs}

[testenv:publish]
description = Publish package to PyPI (use with caution!)
labels = publish
skip_install = true
extras = publish
depends = build
allowlist_externals =
    ls
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload dist/* {posargs}

# Documentation serving
[testenv:serve-docs]
description = Build and serve documentation locally at http://localhost:8000
labels = docs
extras = docs
depends = docs
allowlist_externals =
    bash
commands_pre =
    python --version
commands =
    bash -c "cd docs/_build/html && python -m http.server 8000"

# Version display
[testenv:version]
description = Display current package version
labels = util
usedevelop = true
commands_pre =
    python --version
commands =
    python -c "from nhl_scrabble import __version__; print(f'nhl-scrabble version: {{__version__}}')"
