# ============================================================================
# NHL Scrabble - Tox Configuration
# ============================================================================
# Multi-environment testing with tox-uv for 10-100x faster package installation
# Organized by category for maintainability

# ============================================================================
# Global Configuration
# ============================================================================

[tox]
# Test environments for Python 3.10, 3.11, 3.12, 3.13
envlist =
    py{310,311,312,313}
    ruff-check
    mypy
    ruff-format
    coverage
    pip-audit
    codespell
    pymarkdown
    mdformat
    validate-pyproject
    yamllint
    flake8
    isort
    absolufy-imports
    black
    docformatter
    autopep8
    doc8
    rstcheck
minversion = 4.0
isolated_build = true
skip_missing_interpreters = true

# UV configuration - use tox-uv for 10-100x faster package installation
# This requires tox-uv plugin to be installed: pip install tox-uv
requires = tox-uv>=1.0.0

# ============================================================================
# Base Test Environment
# ============================================================================

[testenv]
# Base test environment configuration
# Note: tox-uv automatically uses UV for faster package installation
description = Run unit and integration tests with pytest
extras = test
commands_pre =
    pytest --version
commands =
    pytest {posargs:tests/}

# ============================================================================
# Python Version Test Environments
# ============================================================================

[testenv:py{310,311,312,313}]
# Test against specific Python versions
description = Run tests with Python {envname}
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v {posargs:tests/}

[testenv:coverage]
# Generate comprehensive test coverage reports
description = Run tests with coverage reporting
labels = test, coverage
usedevelop = true
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest \
        --cov=nhl_scrabble \
        --cov-report=term-missing:skip-covered \
        --cov-report=html \
        --cov-report=xml \
        --cov-fail-under=49 \
        {posargs:tests/}
    python -c 'import os; print("\nCoverage report: file://" + os.path.abspath("htmlcov/index.html"))'

[testenv:unit]
# Run only unit tests
description = Run unit tests only
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/unit {posargs}

[testenv:integration]
# Run only integration tests
description = Run integration tests only
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/integration -m integration {posargs}

# ============================================================================
# Code Quality - Linting and Formatting
# ============================================================================

[testenv:ruff-check]
# Linting - check code quality
description = Run linting (ruff check)
labels = lint, quality
extras = lint
commands_pre =
    ruff --version
commands =
    ruff check src tests {posargs}

[testenv:ruff-format]
# Formatting - check code style
description = Check formatting (ruff format --check)
labels = format, quality
extras = lint
commands_pre =
    ruff --version
commands =
    ruff format --check src tests {posargs}

[testenv:ruff-format-fix]
# Formatting - auto-fix code style
description = Auto-format code (ruff format + check --fix)
labels = format
extras = lint
commands_pre =
    ruff --version
commands =
    ruff format src tests {posargs}
    ruff check --fix src tests {posargs}

[testenv:mypy]
# Type checking - verify type hints
description = Run type checking (mypy)
labels = type, quality
extras = type
commands_pre =
    mypy --version
commands =
    mypy src {posargs}

# ============================================================================
# Code Quality - Security and Validation
# ============================================================================

[testenv:pip-audit]
# Security - scan for vulnerabilities
description = Run security audit (pip-audit)
labels = security
extras = security
commands_pre =
    pip-audit --version
commands =
    pip-audit {posargs}

# ============================================================================
# Documentation Tools - Spell Checking and Linting
# ============================================================================

[testenv:codespell]
# Spell checking - check code and documentation
description = Check spelling in code and documentation
labels = quality
skip_install = true
deps = codespell
commands_pre =
    codespell --version
commands =
    codespell {posargs:src tests docs *.md}

[testenv:pymarkdown]
# Markdown linting - check markdown files
description = Lint markdown files with pymarkdown
labels = quality
skip_install = true
deps = pymarkdownlnt
commands_pre =
    pymarkdown version
commands =
    pymarkdown scan {posargs:*.md docs}

[testenv:mdformat]
# Markdown formatting - format markdown files
description = Format markdown files with mdformat
labels = quality
skip_install = true
allowlist_externals = bash
deps =
    mdformat
    mdformat-gfm
    mdformat-tables
commands_pre =
    mdformat --version
commands =
    bash -c 'mdformat --check *.md docs'

[testenv:validate-pyproject]
# Validate pyproject.toml - check project metadata and configuration
description = Validate pyproject.toml against PEP standards
labels = quality
skip_install = true
deps = validate-pyproject[all]
commands_pre =
    validate-pyproject --version
commands =
    validate-pyproject {posargs:pyproject.toml}

[testenv:yamllint]
# YAML linting - check YAML files
description = Lint YAML files with yamllint
labels = quality
skip_install = true
deps = yamllint
commands_pre =
    yamllint --version
commands =
    yamllint {posargs:.}

[testenv:flake8]
# Python linting - check Python code with flake8
description = Lint Python code with flake8
labels = quality
skip_install = true
deps =
    flake8
    flake8-pyproject
commands_pre =
    flake8 --version
commands =
    flake8 {posargs:src tests}

[testenv:isort]
# Import sorting - sort Python imports
description = Sort Python imports with isort
labels = quality
skip_install = true
deps = isort
commands_pre =
    isort --version
commands =
    isort --check-only --diff src tests {posargs}

[testenv:absolufy-imports]
# Convert relative imports to absolute imports
description = Convert relative imports to absolute imports
labels = quality
skip_install = true
allowlist_externals = bash
deps = absolufy-imports
commands_pre =
commands =
    bash -c 'absolufy-imports --application-directories=src src/**/*.py'

[testenv:black]
# Python code formatting - format Python code with Black
description = Format Python code with Black
labels = format, quality
skip_install = true
deps = black
commands_pre =
    black --version
commands =
    black --check --diff src tests {posargs}

[testenv:autopep8]
# PEP 8 formatting - auto-format Python code
description = Format Python code with autopep8
labels = format, quality
skip_install = true
deps = autopep8
commands_pre =
    autopep8 --version
commands =
    autopep8 --diff --recursive src tests {posargs}

[testenv:docformatter]
# Docstring formatting - format Python docstrings
description = Format Python docstrings with docformatter
labels = format, quality
skip_install = true
deps = docformatter
commands_pre =
    docformatter --version
commands =
    docformatter --diff --recursive --wrap-summaries 100 --wrap-descriptions 100 src tests {posargs}

[testenv:doc8]
# RST documentation linting - check reStructuredText files
description = Lint RST documentation with doc8
labels = quality, docs
skip_install = true
deps = doc8
commands_pre =
    doc8 --version
commands =
    doc8 {posargs:docs}

[testenv:rstcheck]
# RST syntax checking - validate reStructuredText files
description = Check RST syntax with rstcheck
labels = quality, docs
skip_install = true
deps =
    rstcheck
    sphinx
commands_pre =
    rstcheck --version
commands =
    rstcheck --recursive {posargs:docs}

# ============================================================================
# Utility Environments
# ============================================================================

[testenv:check]
# Comprehensive pre-commit checks
description = Run all checks before commit (quality + tests)
labels = test
extras =
    test
    lint
    type
commands_pre =
    ruff --version
    mypy --version
    pytest --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest -v

[testenv:docs]
# Build documentation
description = Build Sphinx documentation
labels = docs
extras = docs
changedir = docs
commands_pre =
    sphinx-build --version
commands =
    sphinx-build -b html . _build/html {posargs}

[testenv:clean]
# Clean build and test artifacts
description = Remove build, test, and coverage artifacts
labels = util
skip_install = true
allowlist_externals =
    rm
    find
commands_pre =
    python --version
commands =
    rm -rf build dist .eggs *.egg-info
    rm -rf .tox .pytest_cache .mypy_cache .ruff_cache htmlcov
    rm -f .coverage coverage.xml
    find . -type d -name __pycache__ -exec rm -rf {{}} +
    find . -type f -name "*.pyc" -delete
    find . -type f -name "*.pyo" -delete

[testenv:build]
# Build distribution packages
description = Build source and wheel distributions
labels = build
skip_install = true
extras = build
commands_pre =
    python --version
    python -m build --version
commands =
    python -m build

[testenv:run]
# Run the application
description = Run the NHL Scrabble analyzer
labels = run
usedevelop = true
commands_pre =
    nhl-scrabble --version
commands =
    nhl-scrabble {posargs:analyze}

# CI/CD simulation environment
# ============================================================================
# CI/CD Simulation
# ============================================================================

[testenv:ci]
description = Simulate CI/CD pipeline locally
labels = ci
allowlist_externals = bash
extras =
    test
    lint
    type
    security
deps =
    codespell
    pymarkdownlnt
    mdformat
    mdformat-gfm
    mdformat-tables
    validate-pyproject[all]
    yamllint
    flake8
    flake8-pyproject
    isort
    absolufy-imports
    black
    docformatter
    autopep8
    doc8
    rstcheck
    sphinx
commands_pre =
    ruff --version
    mypy --version
    pytest --version
    pip-audit --version
    codespell --version
    pymarkdown version
    mdformat --version
    validate-pyproject --version
    yamllint --version
    flake8 --version
    isort --version
    black --version
    docformatter --version
    autopep8 --version
    doc8 --version
    rstcheck --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest --cov=nhl_scrabble --cov-report=term-missing --cov-fail-under=49
    pip-audit
    codespell src tests docs *.md
    pymarkdown scan *.md docs
    bash -c 'mdformat --check *.md docs'
    validate-pyproject pyproject.toml
    yamllint .
    flake8 src tests
    isort --check-only --diff src tests
    bash -c 'absolufy-imports --application-directories=src src/**/*.py'
    black --check --diff src tests
    docformatter --diff --recursive --wrap-summaries 100 --wrap-descriptions 100 src tests
    autopep8 --diff --recursive src tests
    doc8 docs
    rstcheck --recursive docs

# Fast test environment (no coverage)
[testenv:fast]
description = Run tests quickly without coverage
labels = test
extras = {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v -x {posargs:tests/}

# Watch mode for test-driven development
[testenv:watch]
description = Run tests in watch mode (requires pytest-watch)
labels = test
extras =
    test
    watch
commands_pre =
    ptw --version
commands =
    ptw -- -v {posargs}

# Publishing environments
# ============================================================================
# Publishing Environments
# ============================================================================

[testenv:publish-test]
description = Publish package to TestPyPI
labels = publish
skip_install = true
extras = publish
depends = build
allowlist_externals =
    ls
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload --repository testpypi dist/* {posargs}

[testenv:publish]
description = Publish package to PyPI (use with caution!)
labels = publish
skip_install = true
extras = publish
depends = build
allowlist_externals =
    ls
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload dist/* {posargs}

# Documentation serving
[testenv:serve-docs]
description = Build and serve documentation locally at http://localhost:8000
labels = docs
extras = docs
depends = docs
allowlist_externals =
    bash
commands_pre =
    python --version
commands =
    bash -c "cd docs/_build/html && python -m http.server 8000"

# Version display
[testenv:version]
description = Display current package version
labels = util
usedevelop = true
commands_pre =
    python --version
commands =
    python -c "from nhl_scrabble import __version__; print(f'nhl-scrabble version: {{__version__}}')"
