[tox]
requires =
    tox>=4.2
    tox-uv>=1
env_list =
    flake8
    autopep8
    doc8
    ruff-check
    mypy
    ruff-format
    coverage
    diff-cover
    pip-audit
    bandit
    safety
    security
    licenses
    codespell
    pymarkdown
    mdformat
    pyroma
    validate-pyproject
    tox-ini-fmt
    yamllint
    check-jsonschema
    isort
    interrogate
    deptry
    unimport
    pydocstyle
    vulture
    blocklint
    gitlint
    absolufy-imports
    autoflake
    black
    docformatter
    rstcheck
    py{315, 314, 313, 312, 311, 310}
skip_missing_interpreters = true

[testenv]
description = Run unit and integration tests with pytest
extras =
    test
pass_env =
    CI
commands_pre =
    pytest --version
commands =
    pytest --junitxml=junit.xml {posargs:tests/}

[testenv:flake8]
description = Lint Python code with flake8
skip_install = true
deps =
    flake8
    flake8-pyproject
commands_pre =
    flake8 --version
commands =
    flake8 {posargs:src tests}
labels = quality

[testenv:autopep8]
description = Format Python code with autopep8
skip_install = true
deps =
    autopep8
commands_pre =
    autopep8 --version
commands =
    autopep8 --diff --recursive src tests {posargs}
labels = format, quality

[testenv:doc8]
description = Lint RST documentation with doc8
skip_install = true
deps =
    doc8
commands_pre =
    doc8 --version
commands =
    doc8 --ignore-path docs/_build {posargs:docs}
labels = quality, docs

[testenv:ruff-check]
description = Run linting (ruff check)
extras =
    lint
commands_pre =
    ruff --version
commands =
    ruff check src tests {posargs}
labels = lint, quality

[testenv:mypy]
description = Run type checking (mypy)
extras =
    type
commands_pre =
    mypy --version
commands =
    mypy src {posargs}
labels = type, quality

[testenv:ruff-format]
description = Check formatting (ruff format --check)
extras =
    lint
commands_pre =
    ruff --version
commands =
    ruff format --check src tests {posargs}
labels = format, quality

[testenv:coverage]
description = Run tests with coverage reporting
package = editable
extras =
    {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest \
      --cov=nhl_scrabble \
      --cov-report=term-missing:skip-covered \
      --cov-report=html \
      --cov-report=xml \
      --cov-fail-under=49 \
      --junitxml=junit.xml \
      {posargs:tests/}
    python -c 'import os; print("\nCoverage report: file://" + os.path.abspath("htmlcov/index.html"))'
labels = test, coverage

[testenv:diff-cover]
description = Check test coverage on changed lines only (diff coverage)
package = editable
extras =
    test
commands_pre =
    diff-cover --version
    git fetch --depth=100 origin main
commands =
    pytest --cov=nhl_scrabble --cov-report=xml
    diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
allowlist_externals =
    git
labels = quality, coverage

[testenv:pip-audit]
description = Run security audit (pip-audit)
extras =
    security
commands_pre =
    pip-audit --version
commands =
    pip-audit {posargs}
labels = security

[testenv:bandit]
description = Run bandit security scanner
extras =
    security
commands_pre =
    bandit --version
commands =
    bandit -r src/ --configfile pyproject.toml --severity-level medium --confidence-level medium {posargs}
labels = security

[testenv:safety]
description = Run safety dependency vulnerability scanner
extras =
    security
commands_pre =
    safety --version
commands =
    safety check --full-report
labels = security

[testenv:security]
description = Run comprehensive security vulnerability scanning
extras =
    security
commands_pre =
    bandit --version
    safety --version
commands =
    bandit -r src/ --format json --output {envtmpdir}/bandit-report.json --configfile pyproject.toml
    bandit -r src/ --format txt --configfile pyproject.toml
    python -c "import json; data = json.load(open('{envtmpdir}/bandit-report.json')); high_issues = [r for r in data['results'] if r['issue_severity'] == 'HIGH']; exit(1 if high_issues else 0)"
    safety check --json --output {envtmpdir}/safety-report.json
    safety check
labels = security

[testenv:licenses]
description = Check dependency license compliance
extras =
    security
commands_pre =
    pip-licenses --version
commands =
    pip-licenses --format=plain --order=license
    pip-licenses --fail-on=GPL;AGPL;Proprietary --ignore-packages=blocklint;CairoSVG;pyenchant
labels = security, compliance

[testenv:codespell]
description = Check spelling in code and documentation
skip_install = true
deps =
    codespell
commands_pre =
    codespell --version
commands =
    codespell {posargs:src tests docs *.md}
labels = quality

[testenv:pymarkdown]
description = Lint markdown files with pymarkdown
skip_install = true
deps =
    pymarkdownlnt
commands_pre =
    pymarkdown version
commands =
    pymarkdown scan {posargs:*.md docs}
labels = quality

[testenv:mdformat]
description = Format markdown files with mdformat
skip_install = true
deps =
    mdformat
    mdformat-gfm
    mdformat-tables
commands_pre =
    mdformat --version
commands =
    bash -c 'mdformat --check *.md $(find docs -name "*.md" -not -path "docs/reference/cli-generated.md")'
allowlist_externals =
    bash
    find
labels = quality

[testenv:pyroma]
description = Rate Python package metadata quality
skip_install = true
deps =
    pyroma
commands_pre =
commands =
    pyroma {posargs:.}
labels = quality

[testenv:validate-pyproject]
description = Validate pyproject.toml against PEP standards
skip_install = true
deps =
    validate-pyproject[all]
commands_pre =
    validate-pyproject --version
commands =
    validate-pyproject {posargs:pyproject.toml}
labels = quality

[testenv:tox-ini-fmt]
description = Format tox.ini configuration file
skip_install = true
deps =
    tox-ini-fmt
commands_pre =
commands =
    tox-ini-fmt {posargs:tox.ini}
labels = format, quality

[testenv:yamllint]
description = Lint YAML files with yamllint
skip_install = true
deps =
    yamllint
commands_pre =
    yamllint --version
commands =
    yamllint {posargs:.}
labels = quality

[testenv:check-jsonschema]
description = Validate JSON and YAML files against schemas
skip_install = true
deps =
    check-jsonschema>=0.28
commands_pre =
    check-jsonschema --version
commands =
    bash -c 'check-jsonschema --schemafile "https://json.schemastore.org/github-workflow.json" .github/workflows/*.yml'
    bash -c 'if [ -d .github/actions ]; then check-jsonschema --schemafile "https://json.schemastore.org/github-action.json" .github/actions/*/action.yml || true; fi'
    bash -c 'if [ -f .github/dependabot.yml ]; then check-jsonschema --schemafile "https://json.schemastore.org/dependabot-2.0.json" .github/dependabot.yml || true; fi'
allowlist_externals =
    bash
labels = quality, validation

[testenv:isort]
description = Sort Python imports with isort
skip_install = true
deps =
    isort
commands_pre =
    isort --version
commands =
    isort --check-only --diff src tests {posargs}
labels = quality

[testenv:interrogate]
description = Check docstring coverage with interrogate
skip_install = true
deps =
    interrogate
commands_pre =
    interrogate --version
commands =
    interrogate {posargs:src}
labels = quality, docs

[testenv:deptry]
description = Check for dependency issues with deptry
skip_install = true
deps =
    deptry
commands_pre =
    deptry --version
commands =
    deptry {posargs:src}
labels = quality

[testenv:unimport]
description = Check for unused imports with unimport
skip_install = true
deps =
    unimport
commands_pre =
    unimport --version
commands =
    unimport --check --diff {posargs:src}
labels = quality

[testenv:pydocstyle]
description = Check docstring style with pydocstyle
skip_install = true
deps =
    pydocstyle
    tomli
commands_pre =
    pydocstyle --version
commands =
    pydocstyle {posargs:src}
labels = quality, docs

[testenv:vulture]
description = Find dead code with vulture
skip_install = true
deps =
    vulture
commands_pre =
    vulture --version
commands =
    vulture {posargs:src .vulture_allowlist}
labels = quality

[testenv:blocklint]
description = Check for non-inclusive language with blocklint
skip_install = true
deps =
    blocklint
commands_pre =
    python -c "import blocklint; print(f'blocklint {blocklint.__version__}')"
commands =
    blocklint --skip-files .git,.tox,.venv,venv,build,dist,*.egg-info,__pycache__,coverage.xml,htmlcov,.coverage,.pytest_cache,.mypy_cache,.ruff_cache,*.log,*.tmp {posargs:.}
labels = quality

[testenv:gitlint]
description = Lint commit messages with gitlint
skip_install = true
deps =
    gitlint
commands_pre =
    gitlint --version
commands =
    gitlint --commit {posargs:HEAD}
labels = quality

[testenv:absolufy-imports]
description = Convert relative imports to absolute imports
skip_install = true
deps =
    absolufy-imports
commands_pre =
commands =
    bash -c 'absolufy-imports --application-directories=src src/**/*.py'
allowlist_externals =
    bash
labels = quality

[testenv:autoflake]
description = Remove unused imports and variables with autoflake
skip_install = true
deps =
    autoflake
commands_pre =
    autoflake --version
commands =
    autoflake --check --recursive --remove-all-unused-imports --remove-unused-variables --remove-duplicate-keys --ignore-init-module-imports src tests {posargs}
labels = format, quality

[testenv:black]
description = Format Python code with Black
skip_install = true
deps =
    black==24.10
commands_pre =
    black --version
commands =
    black --check --diff src tests {posargs}
labels = format, quality

[testenv:docformatter]
description = Format Python docstrings with docformatter
skip_install = true
deps =
    docformatter
commands_pre =
    docformatter --version
commands =
    docformatter --diff --recursive --wrap-summaries 100 --wrap-descriptions 100 src tests {posargs}
labels = format, quality

[testenv:rstcheck]
description = Check RST syntax with rstcheck
skip_install = true
deps =
    rstcheck
    sphinx
commands_pre =
    rstcheck --version
commands =
    rstcheck --recursive {posargs:docs}
labels = quality, docs

[testenv:licenses-summary]
description = Generate license summary report
extras =
    security
commands_pre =
    pip-licenses --version
commands =
    pip-licenses --summary --format=plain
labels = security, compliance

[testenv:py315]
description = Test with Python 3.15-dev (experimental, may fail)
extras =
    test
commands_pre =
    pytest --version
commands =
    pytest {posargs:tests/}

[testenv:py{310,311,312,313,314}]
description = Run tests with Python {envname}
extras =
    {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest --junitxml=junit-{envname}.xml -v {posargs:tests/}
labels = test

[testenv:unit]
description = Run unit tests only
extras =
    {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/unit {posargs}
labels = test

[testenv:integration]
description = Run integration tests only
extras =
    {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v tests/integration -m integration {posargs}
labels = test

[testenv:benchmark]
description = Run performance benchmark tests
package = editable
extras =
    test
commands_pre =
    pytest --version
commands =
    pytest tests/benchmarks/ --benchmark-only -n 0 --benchmark-save=latest {posargs}
labels = quality, performance

[testenv:benchmark-compare]
description = Compare benchmark results against baseline
package = editable
extras =
    test
commands_pre =
    pytest --version
commands =
    pytest tests/benchmarks/ --benchmark-only -n 0 --benchmark-compare=0001 {posargs}
labels = quality, performance

[testenv:ruff-format-fix]
description = Auto-format code (ruff format + check --fix)
extras =
    lint
commands_pre =
    ruff --version
commands =
    ruff format src tests {posargs}
    ruff check --fix src tests {posargs}
labels = format

[testenv:check]
description = Run all checks before commit (quality + tests)
extras =
    lint
    test
    type
commands_pre =
    ruff --version
    mypy --version
    pytest --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest -v
labels = test

[testenv:docs]
description = Build Sphinx documentation
extras =
    docs
change_dir = docs
commands_pre =
    sphinx-build --version
commands =
    sphinx-build -b html . _build/html {posargs}
labels = docs

[testenv:clean]
description = Remove build, test, and coverage artifacts
skip_install = true
commands_pre =
    python --version
commands =
    rm -rf build dist .eggs *.egg-info
    rm -rf .tox .pytest_cache .mypy_cache .ruff_cache htmlcov
    rm -f .coverage coverage.xml
    find . -type d -name __pycache__ -exec rm -rf {{}} +
    find . -type f -name "*.pyc" -delete
    find . -type f -name "*.pyo" -delete
allowlist_externals =
    find
    rm
labels = util

[testenv:build]
description = Build source and wheel distributions
skip_install = true
extras =
    build
commands_pre =
    python --version
    python -m build --version
commands =
    python -m build
labels = build

[testenv:run]
description = Run the NHL Scrabble analyzer
package = editable
commands_pre =
    nhl-scrabble --version
commands =
    nhl-scrabble {posargs:analyze}
labels = run

[testenv:ci]
description = Simulate CI/CD pipeline locally
deps =
    absolufy-imports
    autopep8
    black
    codespell
    doc8
    docformatter
    flake8
    flake8-pyproject
    isort
    mdformat
    mdformat-gfm
    mdformat-tables
    pymarkdownlnt
    rstcheck
    sphinx
    validate-pyproject[all]
    yamllint
extras =
    lint
    security
    test
    type
commands_pre =
    ruff --version
    mypy --version
    pytest --version
    pip-audit --version
    codespell --version
    pymarkdown version
    mdformat --version
    validate-pyproject --version
    yamllint --version
    flake8 --version
    isort --version
    black --version
    docformatter --version
    autopep8 --version
    doc8 --version
    rstcheck --version
commands =
    ruff format --check src tests
    ruff check src tests
    mypy src
    pytest --cov=nhl_scrabble --cov-report=term-missing --cov-fail-under=49
    pip-audit
    codespell src tests docs *.md
    pymarkdown scan *.md docs
    bash -c 'mdformat --check *.md docs'
    validate-pyproject pyproject.toml
    yamllint .
    flake8 src tests
    isort --check-only --diff src tests
    bash -c 'absolufy-imports --application-directories=src src/**/*.py'
    black --check --diff src tests
    docformatter --diff --recursive --wrap-summaries 100 --wrap-descriptions 100 src tests
    autopep8 --diff --recursive src tests
    doc8 docs
    rstcheck --recursive docs
allowlist_externals =
    bash
labels = ci

[testenv:fast]
description = Run tests quickly without coverage
extras =
    {[testenv]extras}
commands_pre =
    pytest --version
commands =
    pytest -v -x {posargs:tests/}
labels = test

[testenv:watch]
description = Run tests in watch mode (requires pytest-watch)
extras =
    test
    watch
commands_pre =
    ptw --version
commands =
    ptw -- -v {posargs}
labels = test

[testenv:publish-test]
description = Publish package to TestPyPI
skip_install = true
extras =
    publish
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload --repository testpypi dist/* {posargs}
allowlist_externals =
    ls
depends =
    build
labels = publish

[testenv:publish]
description = Publish package to PyPI (use with caution!)
skip_install = true
extras =
    publish
commands_pre =
    twine --version
    ls -lh dist/
commands =
    twine upload dist/* {posargs}
allowlist_externals =
    ls
depends =
    build
labels = publish

[testenv:serve-docs]
description = Build and serve documentation locally at http://localhost:8000
extras =
    docs
commands_pre =
    python --version
commands =
    bash -c "cd docs/_build/html && python -m http.server 8000"
allowlist_externals =
    bash
depends =
    docs
labels = docs

[testenv:version]
description = Display current package version
package = editable
commands_pre =
    python --version
commands =
    python -c "from nhl_scrabble import __version__; print(f'nhl-scrabble version: {{__version__}}')"
labels = util
