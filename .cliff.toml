# git-cliff configuration for automated CHANGELOG generation
# Documentation: https://git-cliff.org/docs/configuration

[changelog]
# Keep a Changelog format header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# Template for each release section
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
    {%- endfor %}
{% endfor %}\n
"""
# Remove trailing whitespace
trim = true
# Footer template
footer = """
<!-- generated by git-cliff -->
"""

[git]
# Parse conventional commits
conventional_commits = true
# Filter out commits that do not follow conventional format
filter_unconventional = true
# Split commits by type
split_commits = false
# Commit parsers (map conventional commit types to Keep a Changelog categories)
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Documentation" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^deprecate", group = "Deprecated" },
    { message = "^remove", group = "Removed" },
    { message = "^security", group = "Security" },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
]
# Protect breaking changes
protect_breaking_commits = false
# Filter out commits
filter_commits = false
# Tag pattern (match version tags like v1.0.0, v2.1.3, etc.)
tag_pattern = "v[0-9]*"
# Skip tags
skip_tags = ""
# Ignore tags
ignore_tags = ""
# Sort commits oldest first
sort_commits = "oldest"
# Limit the number of commits included in the changelog
limit_commits = false
