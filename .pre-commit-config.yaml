# ============================================================================
# NHL Scrabble - Pre-commit Hooks Configuration
# ============================================================================
# 66 comprehensive hooks for code quality, security, and consistency
# Organized by category for maintainability
# Matches ruff's ALL rules philosophy: comprehensive by default with selective ignores

# ============================================================================
# Meta Hooks - Configuration Validation
# ============================================================================

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  # ============================================================================
  # Dependency Management - Sync Hook Versions
  # ============================================================================

  - repo: https://github.com/pre-commit/sync-pre-commit-deps
    rev: v0.0.3
    hooks:
      - id: sync-pre-commit-deps

  # ============================================================================
  # File Quality - General File Checks
  # ============================================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Whitespace and file formatting
      - id: trailing-whitespace
        exclude: ^docs/reference/api/  # Exclude generated API docs
      - id: end-of-file-fixer
        exclude: ^docs/reference/api/  # Exclude generated API docs
      - id: mixed-line-ending
      - id: fix-byte-order-marker

      # File content checks
      - id: check-yaml
      - id: check-toml
      - id: check-json

      # Python-specific checks
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

      # Security checks
      - id: detect-private-key

      # Git checks
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: destroyed-symlinks

      # Executable checks
      - id: check-shebang-scripts-are-executable

  # ============================================================================
  # Python Quality - Code Pattern Checks
  # ============================================================================

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      # Python code quality checks
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations

      # Text content checks
      - id: text-unicode-replacement-char

  # ============================================================================
  # Sensitive Information Prevention - Custom Content Checks
  # ============================================================================

  - repo: local
    hooks:
      - id: check-sensitive-strings
        name: Check for sensitive strings
        description: Prevent commits containing sensitive corporate/personal identifiers
        entry: '(?i)(red\s*hat|bperkins)'
        language: pygrep
        types: [text]
        exclude: '^(\.pre-commit-config\.yaml)$'

  # ============================================================================
  # Python Imports - Import Organization
  # ============================================================================

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        # Comprehensive import sorting (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
      - id: absolufy-imports
        # Convert relative imports to absolute (matches ruff's ALL rules philosophy)
        args: [--application-directories=src]
        files: ^src/

  # ============================================================================
  # Project Validation - Configuration Validation
  # ============================================================================

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.25
    hooks:
      - id: validate-pyproject
        # Comprehensive validation (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/regebro/pyroma
    rev: "5.0.1"
    hooks:
      - id: pyroma
        # Comprehensive Python package metadata quality check (matches ruff's ALL rules philosophy)
        args: ['-d', '.']

  - repo: https://github.com/tox-dev/tox-ini-fmt
    rev: 1.7.1
    hooks:
      # Comprehensive tox.ini formatting (matches ruff's ALL rules philosophy)
      # Formats tox.ini to a standard, consistent structure
      - id: tox-ini-fmt

  # ============================================================================
  # Package Validation - Wheel Contents
  # ============================================================================

  - repo: local
    hooks:
      - id: check-wheel-contents
        name: check wheel contents
        description: Validate Python wheel package contents
        entry: >
          bash -c 'rm -rf build/ dist/ &&
          python -m build --wheel &&
          check-wheel-contents dist/*.whl --ignore W002 --toplevel nhl_scrabble'
        language: python
        additional_dependencies:
          - build
          - check-wheel-contents>=0.6.0
        pass_filenames: false
        # Only run when wheel-related files change
        files: ^(pyproject\.toml|setup\.py|MANIFEST\.in|src/.*\.py)$
        # Or manually: pre-commit run check-wheel-contents --all-files

  # ============================================================================
  # YAML Linting - YAML File Validation
  # ============================================================================

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        # Comprehensive YAML linting (matches ruff's ALL rules philosophy)
        args: []  # Config is in .yamllint

  # ============================================================================
  # JSON/YAML Schema Validation - Schema Compliance Checks
  # ============================================================================

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      # GitHub Actions workflows
      - id: check-github-workflows
        name: check GitHub Actions workflows
        description: Validate GitHub workflow files against official schema
        args: [--verbose]

      # Dependabot configuration
      - id: check-dependabot
        name: check Dependabot config
        description: Validate Dependabot config against official schema
        args: [--verbose]

      # Codecov configuration
      - id: check-jsonschema
        name: check Codecov config
        description: Validate .codecov.yml against Codecov schema
        files: ^\.codecov\.ya?ml$
        args:
          [
            --schemafile,
            https://json.schemastore.org/codecov.json,
            --verbose,
          ]

      # Pre-commit configuration
      - id: check-jsonschema
        name: check pre-commit config
        description: Validate .pre-commit-config.yaml against schema
        files: ^\.pre-commit-config\.ya?ml$
        args:
          [
            --schemafile,
            https://json.schemastore.org/pre-commit-config.json,
            --verbose,
          ]

  # ============================================================================
  # Spelling - Code and Documentation Spell Checking
  # ============================================================================

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ['-L', 'aNULL']  # Ignore OpenSSL cipher suite names
        exclude: ^docs/reference/api/  # Exclude generated API docs

  # ============================================================================
  # Markdown - Markdown Linting and Formatting
  # ============================================================================

  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.36
    hooks:
      - id: pymarkdown
        args: [scan]  # Config is in pyproject.toml
        # Exclude GitHub issue templates (YAML frontmatter incompatible)
        # Exclude tasks (Python code examples trigger MD011 false positives)
        exclude: ^(\.github/ISSUE_TEMPLATE/|tasks/)

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        # Comprehensive markdown formatting (matches ruff's ALL rules philosophy)
        additional_dependencies:
          - mdformat-black  # Code block formatting
          - mdformat-gfm  # GitHub Flavored Markdown support
          - mdformat-ruff  # Python code block linting integration
          - mdformat-web  # HTML/CSS/JS block formatting
        args: []  # Config is in pyproject.toml
        # Exclude GitHub issue templates (YAML frontmatter incompatible) and generated docs
        exclude: ^(\.github/ISSUE_TEMPLATE/|docs/reference/cli-generated\.md)

  # ============================================================================
  # Documentation - RST File Linting and Validation
  # ============================================================================

  - repo: https://github.com/PyCQA/doc8
    rev: v2.0.0
    hooks:
      - id: doc8
        # Comprehensive RST documentation linting (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml
        files: \.(rst|txt)$

  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        # Comprehensive RST syntax checking (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml
        additional_dependencies: [sphinx]

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        # Format code blocks in documentation (RST, Markdown)
        # Exclude files with pseudo-code and doctest examples (>>> prompts)
        args: [--line-length=100]
        additional_dependencies: [black==26.3.1]
        exclude: ^(tasks/|\.claude/commands/|docs/(how-to/(run-tests|build-documentation)\.md|tutorials/01-getting-started\.md|explanation/))

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        # Comprehensive docstring coverage checking (matches ruff's ALL rules philosophy)
        # Requires 100% docstring coverage for all Python code
        args: []  # Config is in pyproject.toml
        pass_filenames: false  # Check entire project for coverage percentage

  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        # Comprehensive docstring style checking (matches ruff's ALL rules philosophy)
        # Checks docstring format and style per PEP 257
        args: []  # Config is in pyproject.toml
        additional_dependencies: [tomli]  # Required to read pyproject.toml

  - repo: https://github.com/osprey-oss/deptry
    rev: 0.24.0
    hooks:
      - id: deptry
        # Comprehensive dependency checker (matches ruff's ALL rules philosophy)
        # Detects: obsolete, missing, transitive, and misplaced dev dependencies
        args: [.]  # Additional config in pyproject.toml
        exclude: ^qa/  # Exclude QA directory (separate package)
        language: python

  - repo: https://github.com/hakancelikdev/unimport
    rev: 1.3.1
    hooks:
      - id: unimport
        # Comprehensive unused import checker (matches ruff's ALL rules philosophy)
        # Finds and reports unused import statements
        args: [--check, --diff]  # Additional config in pyproject.toml

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        # Comprehensive dead code detection (matches ruff's ALL rules philosophy)
        # Finds unused functions, classes, variables, imports, and properties
        args: [src, .vulture_allowlist]  # Config is in pyproject.toml, allowlist for public APIs

  - repo: https://github.com/PrincetonUniversity/blocklint
    rev: v0.3.0
    hooks:
      - id: blocklint
        # Comprehensive inclusive language checker (matches ruff's ALL rules philosophy)
        # Detects non-inclusive terminology related to hierarchical and access control terms
        # Promotes respectful and inclusive code and documentation
        args:
          [
            --skip-files,
            ".git,.tox,.venv,venv,build,dist,*.egg-info,__pycache__,coverage.xml,htmlcov,.coverage,.pytest_cache,.mypy_cache,.ruff_cache,*.log,*.tmp",
          ]

  # ============================================================================
  # UV - Dependency Lock File Validation
  # ============================================================================

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.6
    hooks:
      - id: uv-lock

  # ============================================================================
  # Python Linting - Code Quality Checks
  # ============================================================================

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        # Comprehensive linting (matches ruff's ALL rules philosophy)
        additional_dependencies: [flake8-pyproject]
        args: []  # Config is in pyproject.toml via flake8-pyproject

  # ============================================================================
  # Python Formatting - Code and Docstring Formatting
  # ============================================================================

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        name: pyupgrade
        # Modernize Python syntax for Python 3.12+ (project minimum version)
        description: Automatically upgrade syntax for newer Python versions
        args:
          - --py312-plus  # Target Python 3.12+ syntax (matches requires-python)

  # ============================================================================
  # Python Modernization - Semantic Code Improvements
  # ============================================================================
  # refurb detects Python code that can be simplified or modernized using
  # Python 3.12+ features (pathlib, f-strings, dict merging, comprehensions)
  # Complements pyupgrade (syntax) with semantic improvements
  # Docs: https://github.com/dosisod/refurb

  - repo: local
    hooks:
      - id: refurb
        name: refurb (warning mode - non-blocking)
        # Comprehensive code modernization (matches ruff's ALL rules philosophy)
        # WARNING MODE: Shows suggestions but doesn't block commits during adoption phase
        description: Python code modernization linter (pathlib, comprehensions, modern idioms)
        entry: bash -c 'refurb src/ --enable-all || true'
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
        # Non-blocking during adoption phase (remove '|| true' after team training)
        # Configuration is read automatically from pyproject.toml

  # ============================================================================
  # Python Statement Sorting - Class Member Organization
  # ============================================================================

  - repo: https://github.com/bwhmather/ssort
    rev: 0.16.0
    hooks:
      - id: ssort
        name: ssort
        # Comprehensive Python statement sorting (matches ruff's ALL rules philosophy)
        # Automatically sorts class members (dunder, classmethod, property, public, private)
        # and module-level statements for consistent code organization
        description: Sort Python class members and statements
        args: []
        # Exclude files where order matters
        exclude: ^(tests/fixtures/|migrations/)

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        # Comprehensive unused import/variable removal (matches ruff's ALL rules philosophy)
        # Aligns with ruff's F401 (unused imports) and F841 (unused variables) rules
        args:
          [
            --in-place,
            --remove-all-unused-imports,
            --remove-unused-variables,
            --remove-duplicate-keys,
            --ignore-init-module-imports,
          ]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
        # Comprehensive Python code formatting (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml

  - repo: local
    hooks:
      - id: check-branch-protection
        name: Check Branch Protection
        # Warn when committing directly to main/master
        description: Warn about committing to protected branches
        entry: python .git-hooks/check-branch-protection.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        # Comprehensive docstring formatting (matches ruff's ALL rules philosophy)
        args: [--in-place, --wrap-summaries, "100", --wrap-descriptions, "100"]
        exclude: ^src/nhl_scrabble/formatters/html_formatter\.py$  # Contains HTML template strings

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        # NOTE: ruff-format disabled - using black as authoritative formatter
        # to avoid formatting conflicts between black and ruff on assert statements
        # - id: ruff-format

  # ============================================================================
  # Python Security - Security Vulnerability Detection
  # ============================================================================

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: bandit
        # Comprehensive security vulnerability detection (matches ruff's ALL rules philosophy)
        # Detects: SQL injection, hardcoded secrets, weak crypto, shell injection, unsafe YAML
        description: Security vulnerability detection for Python code
        additional_dependencies: ["bandit[toml]"]
        args:
          [
            --configfile, pyproject.toml,
            --severity-level, medium,
            --confidence-level, medium,
          ]
        # Skip tests directory (test code uses assert, mock patterns)
        exclude: ^tests/

  # ============================================================================
  # Python Security - Dependency Vulnerability Scanning
  # ============================================================================

  - repo: local
    hooks:
      - id: safety
        name: safety
        # Comprehensive dependency vulnerability scanning (matches ruff's ALL rules philosophy)
        # Scans installed packages against CVE databases for known vulnerabilities
        description: Scan dependencies for known security vulnerabilities
        entry: safety
        args:
          [
            check,
            --continue-on-error,  # Don't block commit, just warn
          ]
        language: system
        pass_filenames: false
        # Only run when dependency files change
        files: ^(pyproject\.toml|requirements.*\.txt|uv\.lock)$

  # ============================================================================
  # Type Checking - Static Type Analysis
  # ============================================================================

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, types-PyYAML, pydantic, rich, jinja2]
        args: []  # Config is in pyproject.toml

  # ============================================================================
  # Astral ty - Fast Type Checker (Supplements MyPy)
  # ============================================================================
  # ty is an extremely fast Python type checker from Astral (creators of ruff, uv)
  # Written in Rust for blazing speed (10-100x faster than mypy)
  # Runs alongside mypy during validation period
  # Uses local hook (no official pre-commit repo yet, see: github.com/astral-sh/ty/issues/269)
  # Docs: https://docs.astral.sh/ty/

  - repo: local
    hooks:
      - id: ty
        name: ty - Astral type checker (validation mode - non-blocking)
        entry: bash -c 'ty check src || true'
        language: system
        types: [python]
        pass_filenames: false
        verbose: true
        # Non-blocking during validation period
        # Will show errors but not prevent commits
        # After validation, remove '|| true' to make blocking

  # ============================================================================
  # Git Commit Messages - Commit Message Linting
  # ============================================================================

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        # Comprehensive commit message linting (matches ruff's ALL rules philosophy)
        # Enforces consistent commit message style and documentation
        # Config is in .gitlint file
        stages: [commit-msg]

  # ============================================================================
  # Documentation Generation - Auto-Generated Documentation Check
  # ============================================================================

  - repo: local
    hooks:
      - id: check-generated-docs
        name: Check generated documentation is up-to-date
        # Ensures API and CLI reference docs are regenerated after code changes
        description: Verify auto-generated documentation matches current code
        entry: python scripts/check_docs.py
        language: python
        pass_filenames: false
        # Only run if docstrings or CLI code changed
        files: ^(src/nhl_scrabble/.*\.py|scripts/generate_cli_docs\.py)$
        additional_dependencies: [".[docs-gen]"]
