repos:
  # Meta hooks - validate pre-commit configuration itself
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  # Sync pre-commit hook versions with dependency specifications
  - repo: https://github.com/pre-commit/sync-pre-commit-deps
    rev: v0.0.1
    hooks:
      - id: sync-pre-commit-deps

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Whitespace and file formatting
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: fix-byte-order-marker

      # File content checks
      - id: check-yaml
      - id: check-toml
      - id: check-json

      # Python-specific checks
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]

      # Security checks
      - id: detect-private-key

      # Git checks
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: destroyed-symlinks

      # Executable checks
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      # Python code quality checks
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: python-check-mock-methods
      - id: python-no-eval
      - id: python-no-log-warn
      - id: python-use-type-annotations

      # Text content checks
      - id: text-unicode-replacement-char

  - repo: https://github.com/MarcoGorelli/absolufy-imports
    rev: v0.3.1
    hooks:
      - id: absolufy-imports
        # Convert relative imports to absolute (matches ruff's ALL rules philosophy)
        args: [--application-directories=src]
        files: ^src/

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject
        # Comprehensive validation (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        # Comprehensive YAML linting (matches ruff's ALL rules philosophy)
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.0
    hooks:
      - id: codespell
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/jackdewinter/pymarkdown
    rev: v0.9.25
    hooks:
      - id: pymarkdown
        args: [scan]  # Config is in pyproject.toml

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        # Comprehensive markdown formatting (matches ruff's ALL rules philosophy)
        additional_dependencies:
          - mdformat-gfm  # GitHub Flavored Markdown support
          - mdformat-tables  # Table formatting
        args: []  # Config is in pyproject.toml

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.5.18
    hooks:
      - id: uv-lock

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        # Comprehensive linting (matches ruff's ALL rules philosophy)
        additional_dependencies: [flake8-pyproject]
        args: []  # Config is in pyproject.toml via flake8-pyproject

  - repo: https://github.com/hhatto/autopep8
    rev: v2.0.4
    hooks:
      - id: autopep8
        # Comprehensive PEP 8 formatting (runs before ruff-format)
        # Note: May conflict with ruff-format; autopep8 runs first, ruff-format finalizes
        args: [--in-place, --aggressive, --aggressive]  # Additional config in pyproject.toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests, pydantic]
        args: []  # Config is in pyproject.toml
