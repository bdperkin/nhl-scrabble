# ============================================================================
# NHL Scrabble - Project Configuration
# ============================================================================
# Organized by category for maintainability
# Matches ruff's ALL rules philosophy: comprehensive by default with selective ignores

# ============================================================================
# Build System
# ============================================================================

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ============================================================================
# Project Metadata
# ============================================================================

[project]
name = "nhl-scrabble"
version = "2.0.0"
description = "NHL Roster Scrabble Score Analyzer - Calculate Scrabble scores for NHL player names"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Brandon Perkins", email = "bdperkin@gmail.com"}
]
keywords = ["nhl", "scrabble", "hockey", "analytics", "sports"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Games/Entertainment",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "requests>=2.31.0",
    "requests-cache>=1.2.0",
    "certifi>=2023.0.0",  # SSL/TLS CA bundle for certificate verification
    "click>=8.1.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "jinja2>=3.1.0",
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "starlette>=0.36.0",  # ASGI framework (FastAPI dependency, explicit for middleware)
    "prompt-toolkit>=3.0.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
# Testing dependencies
test = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "pytest-randomly>=3.15.0",
    "pytest-sugar>=1.0.0",
    "pytest-clarity>=1.0.1",
    "pytest-timeout>=2.2.0",
    "pytest-xdist>=3.5.0",
    "pytest-benchmark>=4.0.0",
    "diff-cover>=8.0.0",
    "beautifulsoup4>=4.12.0",
    "httpx>=0.27.0",  # Required for FastAPI TestClient
]

# Code quality dependencies
lint = [
    "ruff>=0.3.0",
]

type = [
    "mypy>=1.8.0",
    "types-requests>=2.31.0",
]

# Security audit dependencies
security = [
    "pip-audit>=2.7.0",    # Scan dependencies for known vulnerabilities
    "bandit[toml]>=1.7.5", # Security linter for Python code
    "safety>=3.0.0",       # Check dependencies against vulnerability database
    "pip-licenses>=4.3.0", # License compliance checking
]

# Branding asset generation dependencies
branding = [
    "Pillow>=10.0.0",      # Image processing for PNG generation
    "cairosvg>=2.7.0",     # SVG to PNG conversion
]

# Export dependencies for CSV/Excel output
export = [
    "openpyxl>=3.1.0",     # Excel file creation and formatting
]

# Comprehensive Sphinx documentation dependencies (9 extensions + markdown support + quality plugins)
docs = [
    "sphinx>=7.2.6",  # Core documentation engine
    "sphinx-autobuild>=2024.2.4",  # Auto-rebuild during development
    "sphinx-autodoc-typehints>=2.0.0",  # Type hint integration
    "sphinx-copybutton>=0.5.2",  # Copy button for code blocks
    "sphinx-design>=0.5.0",  # Modern UI components
    "sphinx-rtd-theme>=2.0.0",  # Read the Docs theme
    "sphinxcontrib-programoutput>=0.17",  # CLI output in docs
    "sphinxcontrib-spelling>=8.0.0",  # Spell checking
    "sphinxext-opengraph>=0.9.1",  # Social sharing metadata
    "myst-parser>=2.0.0",  # Markdown support
    # Quality plugins (enhancement/005)
    "sphinx-sitemap>=2.5.1",  # SEO sitemap generation
    "pytest-sphinx>=0.6.0",  # Documentation build testing
    "blacken-docs>=1.16.0",  # Code formatting in docs
]

# Lightweight documentation generation
docs-gen = [
    "pdoc>=14.0.0",
]

# Watch mode dependencies
watch = [
    "pytest-watch",
]

# Build dependencies
build = [
    "build",
]

# Publish dependencies
publish = [
    "twine>=5.0.0",
]

# Tox dependencies
tox = [
    "tox>=4.0.0",
    "tox-uv>=1.0.0",
]

# Complete development environment
dev = [
    "nhl-scrabble[test,lint,type,security,docs,export,watch,build,publish,tox]",
    "pre-commit>=3.6.0",
    "check-jsonschema>=0.28.0",  # JSON/YAML schema validation
]


# ============================================================================
# Entry Points
# ============================================================================

[project.scripts]
nhl-scrabble = "nhl_scrabble.cli:cli"

[project.urls]
Homepage = "https://github.com/bdperkin/nhl-scrabble"
Repository = "https://github.com/bdperkin/nhl-scrabble"
Issues = "https://github.com/bdperkin/nhl-scrabble/issues"

# Hatchling configuration
[tool.hatch.build.targets.wheel]
packages = ["src/nhl_scrabble"]

# Flake8 configuration
# Note: flake8 doesn't natively support pyproject.toml
# Using flake8-pyproject plugin to enable configuration here
[tool.flake8]
# Comprehensive linting (matches ruff's ALL rules philosophy as closely as possible)
# Align with ruff's configuration
max-line-length = 100
extend-ignore = [
    # Align with ruff's ignores where applicable
    "E501",  # Line too long (handled by formatter)
    "W503",  # Line break before binary operator (conflicts with modern style)
    "E203",  # Whitespace before ':' (conflicts with black/ruff-format)
]
# Match ruff's target version and source paths
per-file-ignores = [
    "__init__.py:F401,F403",  # Unused imports in __init__.py (like ruff's per-file-ignores)
    "tests/*:S101",  # Use of assert (pytest uses assert)
    "src/nhl_scrabble/api/nhl_client.py:C901",  # get_team_roster complexity from retry logic
    "src/nhl_scrabble/api_server/routes/players.py:C901",  # get_players complexity from filtering logic
    "src/nhl_scrabble/validators.py:C901",  # validate_file_path complexity from comprehensive security checks
    "src/nhl_scrabble/cli.py:TC003,C901",  # Path used at runtime; run_analysis complexity from error handling
    "src/nhl_scrabble/config_validators.py:C901",  # validate_safe_path complexity from path traversal checks
]
max-complexity = 10  # Match ruff's mccabe max-complexity
exclude = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
]

# Autoflake configuration
[tool.autoflake]
# Comprehensive unused import/variable removal (matches ruff's ALL rules philosophy)
# Align with ruff's F401 (unused imports) and F841 (unused variables) rules
check = true  # Check only mode (no changes) - use --check in pre-commit/tox
in-place = false  # Don't modify files in place (safer default)
remove-all-unused-imports = true  # Remove all unused imports (matches ruff F401)
remove-unused-variables = true  # Remove unused variables (matches ruff F841)
remove-duplicate-keys = true  # Remove duplicate keys in dictionaries
ignore-init-module-imports = true  # Don't remove imports from __init__.py (matches ruff's per-file-ignores)
# Exclude patterns (align with other tool exclusions)
exclude = [".git", ".tox", ".venv", "venv", "build", "dist", "*.egg-info", "__pycache__"]

# Docformatter configuration
[tool.docformatter]
# Comprehensive docstring formatting (matches ruff's ALL rules philosophy)
# Align with ruff's configuration
wrap_length = 100  # Match ruff's line-length
wrap_summaries = 100  # Match ruff's line-length
wrap_descriptions = 100  # Match ruff's line-length
black = false  # Don't force Black-style multi-line for short docstrings
style = "pep257"  # Follow PEP 257 docstring conventions
make_summary_multi_line = false  # Only make multi-line when necessary
close_quotes_on_newline = false  # Keep closing quotes on same line for short docstrings
pre_summary_newline = false  # Don't add newline before summary (PEP 257 default)
# Exclude patterns (align with other tool exclusions)
exclude = [".git", ".tox", ".venv", "venv", "build", "dist", "*.egg-info"]

# Black configuration
[tool.black]
# Comprehensive Python code formatting (matches ruff's ALL rules philosophy)
# Align with ruff's configuration for consistency
line-length = 100  # Match ruff's line-length
target-version = ["py310", "py311", "py312", "py313"]  # All supported versions (3.10-3.14)
skip-string-normalization = false  # Use double quotes (matches ruff's quote-style)
skip-magic-trailing-comma = false  # Respect magic trailing commas
# Exclude patterns (align with other tool exclusions)
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.tox
  | \.venv
  | venv
  | build
  | dist
  | \.egg-info
  | __pycache__
  | \.pytest_cache
  | \.mypy_cache
  | \.ruff_cache
)/
'''

# Ruff configuration
[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
# Enable comprehensive rule sets for strict linting
select = [
    "ALL",  # Enable all rules by default
]

ignore = [
    # Formatter conflicts
    "E501",    # Line too long (handled by formatter)
    "COM812",  # Trailing comma missing (conflicts with formatter)
    "ISC001",  # Single line implicit string concatenation (conflicts with formatter)

    # Docstring rules (can be overly strict for internal code)
    "D100",    # Missing docstring in public module
    "D101",    # Missing docstring in public class
    "D102",    # Missing docstring in public method
    "D103",    # Missing docstring in public function
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method
    "D106",    # Missing docstring in public nested class
    "D107",    # Missing docstring in __init__
    "D413",    # Missing blank line after last section (conflicts with docformatter)

    # Stylistic choices that may be too opinionated
    "FBT001",  # Boolean positional arg in function definition
    "FBT002",  # Boolean default value in function definition

    # Too strict for practical use
    "TD002",   # Missing author in TODO
    "TD003",   # Missing issue link in TODO
    "FIX002",  # Line contains TODO
    "EM101",   # Exception must not use a string literal
    "EM102",   # Exception must not use an f-string literal
    "TRY003",  # Avoid specifying long messages outside the exception class
    "TRY300",  # Consider moving statement to else block
    "TRY400",  # Use logging.exception instead of logging.error
    "G004",    # Logging statement uses f-string (f-strings in logging are fine in Python 3.10+)
    "PLR2004", # Magic value used in comparison
    "PERF203", # try-except within loop (acceptable tradeoff)
    "ANN401",  # Dynamically typed Any (sometimes necessary)
    "PLC0206", # Extracting from dict without .items()
    "TC001",   # Move imports into type-checking block (requires refactoring)
    "PTH123",  # Use pathlib.Path.open() (not critical for this project)
    "PERF102", # Use dict.values() when only using values
    "RET504",  # Unnecessary assignment before return (stylistic choice)

    # Not applicable or conflicts
    "D203",    # 1 blank line required before class docstring (conflicts with D211)
    "D213",    # Multi-line docstring summary should start at the second line (conflicts with D212)
    "PYI034",  # __enter__ should return self (for stub files only)
    "PYI036",  # __exit__ type annotations (for stub files only)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401",    # Unused imports in __init__.py
    "D104",    # Missing docstring in public package
]
"tests/**/*.py" = [
    "ARG",     # Unused arguments in tests (fixtures)
    "S101",    # Use of assert detected (pytest uses assert)
    "PLR2004", # Magic value used in comparison
    "ANN",     # Type annotations not required in tests
    "PLC0415", # Conditional imports for test exceptions
    "SLF001",  # Private member accessed (testing private methods is intentional)
]
"src/nhl_scrabble/cli.py" = [
    "T201",    # print statements are fine in CLI code
    "PLC0415", # Conditional imports for CLI dependencies
    "TC003",   # Path used at runtime, not just type checking
    "C901",    # run_analysis complexity (11) from comprehensive error handling
]
"src/nhl_scrabble/logging_config.py" = [
    "PLC0415", # Conditional imports for logging configuration
    "PERF403", # Dict comprehension optimization (acceptable for clarity)
]
"src/nhl_scrabble/__main__.py" = [
    "T201",    # print statements are fine in __main__
]
"scripts/generate_branding.py" = [
    "T201",    # print statements are fine in CLI script
    "PLR0915", # Too many statements in main() (straightforward CLI script)
]
"src/nhl_scrabble/api/nhl_client.py" = [
    "C901",    # get_team_roster complexity from retry + 429 handling
    "PLR0912", # Too many branches from retry + 429 handling
]
"src/nhl_scrabble/api_server/routes/*.py" = [
    "FAST002",  # FastAPI Query/Path params don't need Annotated (pre-3.10 style is fine)
    "TRY301",   # Inline raises are fine in FastAPI route handlers
    "ERA001",   # Commented code for clarity (e.g., "# standings_type == ...")
    "C901",     # Route complexity from filtering logic is acceptable
]
"tests/unit/test_nhl_client.py" = [
    "SLF001",  # Private member access for testing internal methods
]

[tool.ruff.lint.mccabe]
# Set maximum cyclomatic complexity
max-complexity = 10

[tool.ruff.lint.pylint]
# Pylint settings
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.isort]
# Import sorting configuration
known-first-party = ["nhl_scrabble"]

# Isort configuration
[tool.isort]
# Comprehensive import sorting (matches ruff's ALL rules philosophy)
# Align with ruff's isort configuration for consistency
profile = "black"  # Use Black-compatible profile (matches ruff-format and black)
line_length = 100  # Match ruff's line-length
known_first_party = ["nhl_scrabble"]  # Match ruff's known-first-party
src_paths = ["src", "tests"]  # Match ruff's src
skip_gitignore = true  # Respect .gitignore
# Import section ordering (standard Python convention)
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]  # codespell:ignore
# Formatting preferences
multi_line_output = 3  # Vertical hanging indent (Black-compatible)
include_trailing_comma = true  # Match Black/ruff-format
force_grid_wrap = 0  # Match Black behavior
use_parentheses = true  # Use parentheses for line continuation
ensure_newline_before_comments = true  # Consistent comment spacing
# Skip patterns (align with other tool exclusions)
skip_glob = [
    ".eggs/*",
    ".git/*",
    ".tox/*",
    ".venv/*",
    "venv/*",
    "build/*",
    "dist/*",
    "*.egg-info/*",
    "__pycache__/*",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = false  # Use docformatter for docstring formatting

# MyPy configuration
[tool.mypy]
python_version = "3.10"

# Enable strict mode (equivalent to all strict flags)
strict = true

# Additional strict options beyond basic strict mode
warn_unreachable = true
warn_no_return = true
disallow_any_unimported = false  # Too strict for third-party libs
disallow_any_expr = false  # Too strict for practical use
disallow_any_decorated = false  # Too strict for decorators
disallow_any_explicit = false  # Too strict for practical use
disallow_any_generics = true
disallow_subclassing_any = true

# Additional warnings
warn_unused_ignores = true
warn_return_any = true
warn_redundant_casts = true
warn_unused_configs = true

# Strict optional handling
strict_optional = true
strict_equality = true
strict_concatenate = true

# Error reporting
show_error_context = true
show_column_numbers = true
show_error_code_links = true
pretty = true
color_output = true
error_summary = true
show_absolute_path = false

# Import discovery
namespace_packages = true
explicit_package_bases = false  # Avoid duplicate module detection
ignore_missing_imports = true  # Practical for third-party libs without stubs
mypy_path = "src"

# Miscellaneous
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_untyped_decorators = false
warn_return_any = false
check_untyped_defs = false

[[tool.mypy.overrides]]
module = ["nhl_scrabble.cli"]
disallow_untyped_defs = false
disallow_untyped_decorators = false
warn_return_any = false

[[tool.mypy.overrides]]
module = ["nhl_scrabble.web.*"]
disallow_untyped_decorators = false  # FastAPI decorators don't have type stubs
disallow_subclassing_any = false  # Allow BaseHTTPMiddleware (has type Any in some mypy versions)

[[tool.mypy.overrides]]
module = ["nhl_scrabble.api_server.*"]
disallow_untyped_decorators = false  # FastAPI decorators don't have type stubs
warn_return_any = false  # FastAPI routes return Any via decorators
check_untyped_defs = false  # FastAPI decorated functions are untyped

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Timeout configuration
timeout = 60  # Default: 60 seconds (increased for integration tests with real API calls)
timeout_method = "thread"  # Use threading for better compatibility

# JUnit XML configuration for Codecov Test Analytics
junit_family = "xunit2"
junit_logging = "all"

addopts = [
    "--strict-markers",
    "--strict-config",
    "-n", "auto",  # Parallel execution: auto-detect CPU cores
    "--cov=nhl_scrabble",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=html",
    "--cov-report=xml",
    "--timeout=60",  # Enforce 60s timeout (accommodates integration tests)
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
    "timeout: Custom timeout for specific tests (e.g., @pytest.mark.timeout(300))",
    "no_parallel: Tests that must run sequentially (e.g., @pytest.mark.no_parallel)",
]

# Coverage configuration
[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "htmlcov"

# Diff-cover configuration
[tool.diff_cover]
# Compare against main branch
compare_branch = "origin/main"

# Minimum coverage percentage required on diff
fail_under = 80.0

# Include only source files
include_paths = ["src/"]

# Exclude patterns
exclude_paths = [
    "tests/",
    "*/__main__.py",
]

# Benchmark configuration
[tool.pytest_benchmark]
# Save results for comparison
save = true
save_data = true

# Automatically compare against previous runs
compare = "0001"  # Compare against run 0001 (baseline)

# Fail if performance degrades beyond threshold
fail_on_regression = true
regression_threshold = 0.2  # 20% slower = fail

# Storage location
storage = ".benchmarks"

# Columns to display
columns = ["min", "max", "mean", "stddev", "median", "iqr", "outliers", "rounds", "iterations"]

# Histogram display
histogram = "normal"

# Warmup rounds (iterations before measurement)
warmup = true
warmup_iterations = 5

# Minimum time to run each benchmark
min_time = 0.000005  # 5 microseconds

# Codespell configuration
[tool.codespell]
# Comprehensive by default (matches ruff's ALL rules philosophy)
check-filenames = true
check-hidden = true

# Skip patterns for non-text files and generated content
skip = '*.lock,*.json,*.min.js,*.svg,htmlcov/*,.git/*,.tox/*,.venv/*,*.egg-info/*,build/*,dist/*,.pytest_cache/*,.mypy_cache/*,.ruff_cache/*,docs/reference/api,docs/_build/*'

# Project-specific ignore words (like ruff's ignore list)
# Add false positives here as they are discovered in .codespell-ignore-words.txt
ignore-words = '.codespell-ignore-words.txt'

# Consistency settings
count = true
quiet-level = 0  # Show all issues (comprehensive)

# Validate-pyproject configuration
# Note: validate-pyproject validates this file (pyproject.toml) against PEP standards
# It doesn't have configuration options itself - it validates the project metadata
# Comprehensive validation (matches ruff's ALL rules philosophy):
# - PEP 517: Build system declaration
# - PEP 518: Specifying build system requirements
# - PEP 621: Project metadata in pyproject.toml
# - PEP 631: Dependency specification
# All validations are enabled by default, ensuring complete compliance

# Yamllint configuration
# Note: yamllint doesn't natively support pyproject.toml configuration
# Configuration is in .yamllint file in the repository root
# This section documents the configuration approach (matches ruff's ALL rules philosophy):
# - Extends default configuration (comprehensive by default)
# - Line length: 100 (aligns with ruff's line-length)
# - Document start: disabled (not always necessary)
# - Truthy values: disabled (yes/no are common and clear)
# - Indentation: 2 spaces (standard for YAML)

# Absolufy-imports configuration
# Note: absolufy-imports doesn't natively support pyproject.toml configuration
# Configuration is via command-line arguments in pre-commit and tox
# This section documents the configuration approach (matches ruff's ALL rules philosophy):
# - Convert all relative imports to absolute imports (comprehensive by default)
# - Application directories: src (matches project src layout)
# - Aligns with ruff's import handling and isort configuration

# Rstcheck configuration
[tool.rstcheck]
# Comprehensive RST syntax checking (matches ruff's ALL rules philosophy)
# Report levels: 1=info, 2=warning, 3=error, 4=severe
report_level = "INFO"  # Most comprehensive (report everything)
# Ignore paths (align with other tool exclusions)
ignore_directives = []  # Empty for comprehensive checking
ignore_roles = []  # Empty for comprehensive checking
ignore_substitutions = []  # Empty for comprehensive checking
ignore_languages = []  # Empty for comprehensive checking
ignore_messages = ""  # Empty for comprehensive checking

# Doc8 configuration
[tool.doc8]
# Comprehensive RST documentation linting (matches ruff's ALL rules philosophy)
# Align with ruff's line-length = 100 for consistency
max-line-length = 100  # Match ruff's line-length
# Check file extensions
extensions = [".rst", ".txt"]  # Standard RST extensions
# Ignore paths (align with other tool exclusions)
ignore-path = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "htmlcov",
]
# Ignore specific checks (none by default for comprehensive checking)
ignore = []
# Enable verbose output
verbose = false
# Check that files end with a newline (matches end-of-file-fixer)
file-encoding = "utf-8"

# Mdformat configuration
[tool.mdformat]
# Comprehensive markdown formatting (matches ruff's ALL rules philosophy)
# Align with ruff's line-length = 100 for consistency
wrap = 100
# Number of spaces for list indentation (align with YAML indentation)
number = true
# End files with a single newline (matches end-of-file-fixer)
end_of_line = "lf"

# PyMarkdown configuration
[tool.pymarkdown]
# Comprehensive by default (matches ruff's ALL rules philosophy)
# Enable strict mode for maximum rule coverage
mode.strict-config = true

# Plugins configuration - enable all rules by default (like ruff's ALL)
plugins.enabled = [
    "md001",  # MD001 - Heading levels should only increment by one level at a time
    "md002",  # MD002 - First heading should be a top level heading
    "md003",  # MD003 - Heading style
    "md004",  # MD004 - Unordered list style
    "md005",  # MD005 - Inconsistent indentation for list items at the same level
    "md006",  # MD006 - Consider starting bulleted lists at the beginning of the line
    "md007",  # MD007 - Unordered list indentation
    "md009",  # MD009 - Trailing spaces
    "md010",  # MD010 - Hard tabs
    "md011",  # MD011 - Reversed link syntax
    "md012",  # MD012 - Multiple consecutive blank lines
    "md013",  # MD013 - Line length
    "md014",  # MD014 - Dollar signs used before commands without showing output
    "md018",  # MD018 - No space after hash on atx style heading
    "md019",  # MD019 - Multiple spaces after hash on atx style heading
    "md020",  # MD020 - No space inside hashes on closed atx style heading
    "md021",  # MD021 - Multiple spaces inside hashes on closed atx style heading
    "md022",  # MD022 - Headings should be surrounded by blank lines
    "md023",  # MD023 - Headings must start at the beginning of the line
    "md024",  # MD024 - Multiple headings with the same content
    "md025",  # MD025 - Multiple top level headings in the same document
    "md026",  # MD026 - Trailing punctuation in heading
    "md027",  # MD027 - Multiple spaces after blockquote symbol
    "md028",  # MD028 - Blank line inside blockquote
    "md029",  # MD029 - Ordered list item prefix
    "md030",  # MD030 - Spaces after list markers
    "md031",  # MD031 - Fenced code blocks should be surrounded by blank lines
    "md032",  # MD032 - Lists should be surrounded by blank lines
    "md033",  # MD033 - Inline HTML
    "md034",  # MD034 - Bare URL used
    "md035",  # MD035 - Horizontal rule style
    "md036",  # MD036 - Emphasis used instead of a heading
    "md037",  # MD037 - Spaces inside emphasis markers
    "md038",  # MD038 - Spaces inside code span elements
    "md039",  # MD039 - Spaces inside link text
    "md040",  # MD040 - Fenced code blocks should have a language specified
    "md041",  # MD041 - First line in file should be a top level heading
    "md042",  # MD042 - No empty links
    "md043",  # MD043 - Required heading structure
    "md044",  # MD044 - Proper names should have the correct capitalization
    "md045",  # MD045 - Images should have alternate text (alt text)
