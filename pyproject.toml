    "NHLApiNotFoundError",
    "track_score_calculation",
    "track_report_generation",
    "track_api_fetching",
    "ReportGenerator",
    "get_report",
    "validate_safe_path",
    "validate_url",
    "validate_float_range",
    "validate_output_format",
    "reset",
    "health",
    "root",
    "favicon",
    "dispatch",
    "templates",
    "get_players",
    "get_standings",
    "get_team",
    "get_teams",
    "test_*",
    "fixture_*",
    "*_fixture",
    "args",
    "kwargs",
    "_*",
]
min_confidence = 60

[tool.bandit]
targets = [
    "src",
]
exclude_dirs = [
    "tests",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
]
severity = "LOW"
confidence = "LOW"
skips = [
    "B101",
    "B311",
]
exclude_tests = []

[tool.check-wheel-contents]
toplevel = [
    "nhl_scrabble",
]
ignore = [
    "W002",
]
