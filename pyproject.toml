# Selective disables (like ruff's ignore list)
plugins.disabled = []

# Rule-specific configuration (like ruff's per-file-ignores)
# MD010 - Hard tabs
# Disabled as it triggers false positives in code blocks (e.g., Makefile snippets)
plugins.md010.enabled = false  # False positives in code blocks requiring tabs

# MD012 - Multiple consecutive blank lines
# Keep enabled to catch actual formatting issues
plugins.md012.enabled = true

# MD029 - Ordered list item prefix
# Disabled as the current documentation style uses continuous numbering (1,2,3)
# which pymarkdown interprets as separate lists that should each start at 1
plugins.md029.enabled = false  # Documentation uses continuous numbering style

# MD013 - Line length
# Disabled for markdown as documentation often has long lines (URLs, examples, tables)
# Ruff's line-length = 100 applies to Python code, not necessarily markdown docs
plugins.md013.enabled = false  # Too strict for documentation with URLs and examples

# MD022 - Headings should be surrounded by blank lines
# Disabled as it's a common pattern in structured documentation
plugins.md022.enabled = false  # Common formatting pattern, would require extensive doc changes

# MD024 - Multiple headings with the same content
# Disabled as it's unavoidable in CHANGELOGs (repeated "Added", "Changed", "Fixed" sections)
plugins.md024.enabled = false  # Common in CHANGELOG files with standard section names

# MD031 - Fenced code blocks should be surrounded by blank lines
# Disabled as it's a very common pattern in existing documentation
plugins.md031.enabled = false  # Common pattern, would require extensive doc changes

# MD032 - Lists should be surrounded by blank lines
# Disabled for compatibility with existing documentation style
plugins.md032.enabled = false  # Common pattern in documentation

# MD033 - Inline HTML (allow for necessary HTML in markdown)
plugins.md033.enabled = false  # Too strict for practical documentation

# MD034 - Bare URL used
# Disabled as bare URLs are common in reference sections
plugins.md034.enabled = false  # Common in documentation reference sections

# MD036 - Emphasis used instead of heading
# Disabled as it's common pattern in structured docs (CHANGELOG, CONTRIBUTING)
plugins.md036.enabled = false  # Common formatting pattern in structured documentation

# MD040 - Fenced code blocks should have language
# Disabled as many code blocks don't need language specification (examples, output, etc.)
plugins.md040.enabled = false  # Too strict, not all code blocks need language specification

# MD041 - First line in file should be a top level heading
plugins.md041.enabled = false  # Too strict, not all markdown files need h1 first

# MD043 - Required heading structure
plugins.md043.enabled = false  # Too strict, overly prescriptive

# UV configuration
[tool.uv]
# Managed by uv for faster dependency resolution
managed = true
package = true

# Compile Python bytecode (.pyc files) for faster imports
compile-bytecode = true

# Link mode for installing packages
link-mode = "copy"

# Strict dependency resolution (like ruff's ALL rules philosophy)
resolution = "highest"  # Use highest compatible versions

# Dependency verification and constraints
constraint-dependencies = []  # Strict dependency constraints
override-dependencies = []    # Override specific dependencies if needed

# Index configuration for strict package resolution
index-strategy = "first-index"  # Use first matching index (deterministic)
keyring-provider = "disabled"   # Disable keyring for reproducibility

# Cache configuration for reproducibility
cache-keys = []  # Custom cache keys for strict caching

# Python preference (prefer system or managed Python)
python-preference = "managed"  # Use managed Python installations

# Enable preview features for latest capabilities
preview = false  # Disable preview features for stability

[tool.uv.sources]
# Optional: Configure custom package sources here if needed

# ============================================================================
# Interrogate - Docstring Coverage Checking
# ============================================================================

[tool.interrogate]
# Comprehensive docstring coverage checking (matches ruff's ALL rules philosophy)
fail-under = 100.0  # Require 100% docstring coverage (current coverage is 100%)
verbose = 2  # Maximum verbosity (-vv)
quiet = false  # Print output
color = true  # Enable color output

# What to check (comprehensive by default)
ignore-init-method = false  # Check __init__ methods
ignore-init-module = false  # Check __init__.py modules
ignore-magic = false  # Check magic methods
ignore-module = false  # Check module-level docstrings
ignore-nested-functions = false  # Check nested functions
ignore-nested-classes = false  # Check nested classes
ignore-overloaded-functions = false  # Check @typing.overload functions
ignore-private = false  # Check private methods (__)
ignore-semiprivate = false  # Check semiprivate methods (_)
ignore-property-decorators = false  # Check property decorators
ignore-setters = false  # Check property setters

# File patterns
exclude = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
    "tests",  # Exclude tests from docstring coverage checks
]

# Python file extensions
ext = []  # Only .py files (default)

# Docstring style
style = "sphinx"  # Sphinx-style docstrings (default)

# Output options
omit-covered-files = false  # Show all files even if 100% covered

# ============================================================================
# Deptry - Dependency Checker
# ============================================================================

[tool.deptry]
# Comprehensive dependency checking (matches ruff's ALL rules philosophy)

# Directories/files to exclude from scanning (regex patterns)
exclude = [
    "\\.git",
    "\\.tox",
    "\\.venv",
    "venv",
    "build",
    "dist",
    ".*\\.egg-info",
    "__pycache__",
    "tests",  # Test files often have test-specific imports
    "scripts",  # Standalone scripts with their own dependencies
]

# Development dependency groups (PEP 621 optional-dependencies)
# All optional-dependencies groups are for development, not production
optional_dependencies_dev_groups = [
    "test",
    "lint",
    "type",
    "security",
    "docs",
    "docs-gen",
    "watch",
    "build",
    "publish",
    "tox",
    "dev",
    "branding",  # Asset generation (scripts/generate_branding.py)
]

# Ignore specific errors if needed (comprehensive by default - no ignores)
ignore = []  # Empty list means check everything

# Per-rule ignores for specific packages/modules (comprehensive by default)
[tool.deptry.per_rule_ignores]
# No per-rule ignores - comprehensive checking

# Package to module name mapping
# Deptry auto-detects most, but we can specify exceptions if needed
[tool.deptry.package_module_name_map]
# Package name -> module name mapping for packages where they differ
python-dotenv = "dotenv"  # python-dotenv package provides 'dotenv' module

# ============================================================================
# Unimport - Unused Import Checker
# ============================================================================

[tool.unimport]
# Comprehensive unused import checking (matches ruff's ALL rules philosophy)

# File patterns to exclude from scanning (regex pattern)
exclude = "\\.git|\\.tox|\\.venv|venv|build|dist|.*\\.egg-info|__pycache__"

# Ignore __init__.py files (they often have intentional re-exports)
ignore_init = true  # Match ruff's per-file-ignores for __init__.py F401

# Include star imports in scanning (comprehensive checking)
include_star_import = false  # Star imports are already flagged by ruff (F403/F405)

# Use gitignore patterns
gitignore = true  # Respect .gitignore patterns

# ============================================================================
# Pydocstyle - Docstring Style Checker
# ============================================================================

[tool.pydocstyle]
# Comprehensive docstring style checking (matches ruff's ALL rules philosophy)
convention = "pep257"  # PEP 257 convention (comprehensive)

# Match patterns for files to check
match = ".*\\.py"  # Check all .py files
match_dir = "[^\\.].*"  # Check all non-hidden directories

# Additional error codes to ignore on top of convention (align with ruff's D ignores)
add-ignore = [
    "D100",  # Missing docstring in public module (checked by interrogate)
    "D101",  # Missing docstring in public class (checked by interrogate)
    "D102",  # Missing docstring in public method (checked by interrogate)
    "D103",  # Missing docstring in public function (checked by interrogate)
    "D104",  # Missing docstring in public package (checked by interrogate)
    "D105",  # Missing docstring in magic method (checked by interrogate)
    "D106",  # Missing docstring in public nested class (checked by interrogate)
    "D107",  # Missing docstring in __init__ (checked by interrogate)
    "D202",  # No blank lines allowed after function docstring (conflicts with black)
    "D203",  # 1 blank line required before class docstring (conflicts with D211)
    "D213",  # Multi-line docstring summary should start at second line (conflicts with D212)
    "D413",  # Missing blank line after last section (conflicts with docformatter)
]

# ============================================================================
# Vulture - Dead Code Detection
# ============================================================================

[tool.vulture]
# Comprehensive dead code detection (matches ruff's ALL rules philosophy)

# Exclude patterns (align with ruff's extend-exclude and other tool exclusions)
exclude = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
]

# Ignore decorators that mark functions/classes as used
ignore_decorators = [
    "@*.command",          # Click commands (e.g., @cli.command)
    "@*.group",            # Click groups
    "@*.option",           # Click options
    "@*.argument",         # Click arguments
    "@pytest.fixture",     # Pytest fixtures
    "@pytest.mark.*",      # Pytest markers
    "@app.route",          # Flask/FastAPI routes
    "@app.get",            # FastAPI GET endpoints
    "@app.post",           # FastAPI POST endpoints
    "@app.put",            # FastAPI PUT endpoints
    "@app.patch",          # FastAPI PATCH endpoints
    "@app.delete",         # FastAPI DELETE endpoints
    "@*.register",         # Registration decorators
    "@property",           # Property decorators
    "@*.setter",           # Property setters
    "@*.getter",           # Property getters
    "@staticmethod",       # Static methods
    "@classmethod",        # Class methods
    "@abstractmethod",     # Abstract methods
]

# Ignore names that match these patterns
ignore_names = [
    # Magic methods and protocol implementations
    "exc_*",              # Exception info variables (exc_type, exc_val, exc_tb)
    "format",             # Logging formatter method (called by framework)

    # Public API exceptions (part of public API even if not currently used)
    "NHLApiNotFoundError",  # Exception class reserved for future use
    "track_score_calculation",  # ProgressManager method used via context manager (vulture can't detect)
    "track_report_generation",  # ProgressManager method reserved for future use (lazy eval prevents current use)
    "track_api_fetching",  # ProgressManager method used via TeamProcessor callback (vulture can't detect)

    # Lazy report generation (used via CLI --report option, vulture can't detect dynamic invocation)
    "ReportGenerator",    # ReportGenerator class used dynamically in CLI
    "get_report",         # ReportGenerator method used via CLI --report flag
    "validate_safe_path",   # config_validators function - public API for configuration validation
    "validate_url",       # Validator/config_validators function part of public API (reserved for future use)
    "validate_float_range",  # validators function - public API (legacy, replaced by config_validators)
    "validate_output_format",  # validators function - public API (legacy, replaced by config_validators)
    "reset",              # RateLimiter.reset() method part of public API (used for testing/manual reset)

    # FastAPI framework patterns (called at runtime by framework)
    "health",             # FastAPI endpoint function (registered via decorator)
    "root",               # FastAPI endpoint function (registered via decorator)
    "favicon",            # FastAPI endpoint function (registered via decorator)
    "dispatch",           # Middleware method (called by Starlette BaseHTTPMiddleware)
    "templates",          # Jinja2Templates instance (used by future endpoints)
    "get_players",        # FastAPI endpoint (api_server/routes/players.py)
    "get_standings",      # FastAPI endpoint (api_server/routes/standings.py)
    "get_team",           # FastAPI endpoint (api_server/routes/teams.py)
    "get_teams",          # FastAPI endpoint (api_server/routes/teams.py)

    # Test-related patterns
    "test_*",             # Test functions
    "fixture_*",          # Test fixtures
    "*_fixture",          # Test fixtures (alternative naming)

    # Common unused but required parameters
    "args",               # Variadic args
    "kwargs",             # Keyword args
    "_*",                 # Private/unused variables (convention)
]

# Minimum confidence for reporting (60 = comprehensive detection)
# Set to 60 for comprehensive dead code detection while being practical
# Values: 0 (all) to 100 (only certain)
min_confidence = 60

# ============================================================================
# Blocklint - Inclusive Language Checker
# ============================================================================

# Note: Blocklint does not support pyproject.toml configuration
# Configuration is provided via command-line arguments in pre-commit and tox
#
# Command-line arguments used:
#   --skip-files: Exclude generated and build artifacts
#
# Default blocklist: Non-inclusive terms related to hierarchical and access control
# These terms are checked case-insensitively with special characters between
#
# Comprehensive by default (matches ruff's ALL rules philosophy):
# - Detects non-inclusive terminology in code, comments, and documentation
# - Promotes inclusive language in technical writing
# - Aligns with modern best practices for respectful code
#
# Skip patterns (aligned with ruff's extend-exclude):
# - .git, .tox, .venv, venv (version control and virtual environments)
# - build, dist, *.egg-info (build artifacts)
# - __pycache__, *.pyc (Python cache)
# - coverage.xml, htmlcov, .coverage (coverage reports)
# - .pytest_cache, .mypy_cache, .ruff_cache (tool caches)
# - *.log, *.tmp (temporary files)

# ============================================================================
# Gitlint - Commit Message Linter
# ============================================================================

# Note: Gitlint configuration is in .gitlint file
# Gitlint has issues parsing complex pyproject.toml files with duplicate sections
# Configuration file: .gitlint
#
# Comprehensive commit message linting (matches ruff's ALL rules philosophy):
# - Title max length: 100 characters (matches ruff's line-length)
# - Title min length: 5 characters (meaningful commits)
# - Body max line length: 100 characters (matches ruff's line-length)
# - Body min length: 10 characters (when body is present)
# - Verbosity: 2 (detailed output for better understanding)
# - Ignore commits: merge, revert, fixup, fixup-amend, squash (auto-generated)
# - Ignore rules: B6 (body-is-missing - allows commits without body)
#
# Comprehensive by default:
# - Enforces consistent commit message style
# - Ensures commits are well-documented and descriptive
# - Aligns with conventional commits best practices
# - Promotes clear git history for team collaboration
# - Works harmoniously with conventional commit standards

# ============================================================================
# Bandit Security Linter Configuration
# ============================================================================

[tool.bandit]
# Comprehensive security checking (matches ruff's ALL rules philosophy)
# Scans Python code for common security issues and vulnerabilities

# Directories to scan
targets = ["src"]

# Exclude test files and build artifacts
exclude_dirs = [
    "tests",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
]

# Security level: LOW, MEDIUM, HIGH
# Comprehensive by default - report all severity levels
severity = "LOW"

# Confidence level: LOW, MEDIUM, HIGH
# Comprehensive by default - report all confidence levels
confidence = "LOW"

# Issues to skip (with justification)
# B311: random used for jitter in retry logic (not cryptographic purposes)
# B101: assert_used - tests use assert statements (excluded via exclude_dirs)
# These are explicitly documented in code with noqa comments
skips = [
    "B101",  # assert_used - Used in tests (excluded anyway)
    "B311",  # random - Jitter in retry logic, not crypto
]

# Specific tests to exclude (if needed)
# Currently: run all security tests comprehensively
exclude_tests = []
