[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nhl-scrabble"
version = "2.0.0"
description = "NHL Roster Scrabble Score Analyzer - Calculate Scrabble scores for NHL player names"
readme = "README.md"
requires-python = ">=3.10,<3.14"
license = {text = "MIT"}
authors = [
    {name = "Brandon Perkins", email = "bdperkin@gmail.com"}
]
keywords = ["nhl", "scrabble", "hockey", "analytics", "sports"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Games/Entertainment",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "requests>=2.31.0",
    "click>=8.1.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
# Testing dependencies
test = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
]

# Code quality dependencies
lint = [
    "ruff>=0.3.0",
]

type = [
    "mypy>=1.8.0",
    "types-requests>=2.31.0",
]

# Security dependencies
security = [
    "pip-audit>=2.7.0",
]

# Documentation dependencies
docs = [
    "sphinx>=7.2.0",
    "sphinx-rtd-theme>=2.0.0",
    "sphinx-click>=5.1.0",
]

# Watch mode dependencies
watch = [
    "pytest-watch",
]

# Build dependencies
build = [
    "build",
]

# Publish dependencies
publish = [
    "twine>=5.0.0",
]

# Tox dependencies
tox = [
    "tox>=4.0.0",
    "tox-uv>=1.0.0",
]

# Complete development environment
dev = [
    "nhl-scrabble[test,lint,type,security,docs,watch,build,publish,tox]",
    "pre-commit>=3.6.0",
]

[project.scripts]
nhl-scrabble = "nhl_scrabble.cli:cli"

[project.urls]
Homepage = "https://github.com/bdperkin/nhl-scrabble"
Repository = "https://github.com/bdperkin/nhl-scrabble"
Issues = "https://github.com/bdperkin/nhl-scrabble/issues"

# Hatchling configuration
[tool.hatch.build.targets.wheel]
packages = ["src/nhl_scrabble"]

# Ruff configuration
[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
# Enable comprehensive rule sets for strict linting
select = [
    "ALL",  # Enable all rules by default
]

ignore = [
    # Formatter conflicts
    "E501",    # Line too long (handled by formatter)
    "COM812",  # Trailing comma missing (conflicts with formatter)
    "ISC001",  # Single line implicit string concatenation (conflicts with formatter)

    # Docstring rules (can be overly strict for internal code)
    "D100",    # Missing docstring in public module
    "D101",    # Missing docstring in public class
    "D102",    # Missing docstring in public method
    "D103",    # Missing docstring in public function
    "D104",    # Missing docstring in public package
    "D105",    # Missing docstring in magic method
    "D106",    # Missing docstring in public nested class
    "D107",    # Missing docstring in __init__

    # Stylistic choices that may be too opinionated
    "FBT001",  # Boolean positional arg in function definition
    "FBT002",  # Boolean default value in function definition

    # Too strict for practical use
    "TD002",   # Missing author in TODO
    "TD003",   # Missing issue link in TODO
    "FIX002",  # Line contains TODO
    "EM101",   # Exception must not use a string literal
    "EM102",   # Exception must not use an f-string literal
    "TRY003",  # Avoid specifying long messages outside the exception class
    "TRY300",  # Consider moving statement to else block
    "TRY400",  # Use logging.exception instead of logging.error
    "G004",    # Logging statement uses f-string (f-strings in logging are fine in Python 3.10+)
    "PLR2004", # Magic value used in comparison
    "PERF203", # try-except within loop (acceptable tradeoff)
    "ANN401",  # Dynamically typed Any (sometimes necessary)
    "PLC0206", # Extracting from dict without .items()
    "TC001",   # Move imports into type-checking block (requires refactoring)
    "PTH123",  # Use pathlib.Path.open() (not critical for this project)
    "PERF102", # Use dict.values() when only using values
    "RET504",  # Unnecessary assignment before return (stylistic choice)

    # Not applicable or conflicts
    "D203",    # 1 blank line required before class docstring (conflicts with D211)
    "D213",    # Multi-line docstring summary should start at the second line (conflicts with D212)
    "PYI034",  # __enter__ should return self (for stub files only)
    "PYI036",  # __exit__ type annotations (for stub files only)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401",    # Unused imports in __init__.py
    "D104",    # Missing docstring in public package
]
"tests/**/*.py" = [
    "ARG",     # Unused arguments in tests (fixtures)
    "S101",    # Use of assert detected (pytest uses assert)
    "PLR2004", # Magic value used in comparison
    "ANN",     # Type annotations not required in tests
    "PLC0415", # Conditional imports for test exceptions
]
"src/nhl_scrabble/cli.py" = [
    "T201",    # print statements are fine in CLI code
    "PLC0415", # Conditional imports for CLI dependencies
]
"src/nhl_scrabble/logging_config.py" = [
    "PLC0415", # Conditional imports for logging configuration
    "PERF403", # Dict comprehension optimization (acceptable for clarity)
]
"src/nhl_scrabble/__main__.py" = [
    "T201",    # print statements are fine in __main__
]

[tool.ruff.lint.mccabe]
# Set maximum cyclomatic complexity
max-complexity = 10

[tool.ruff.lint.pylint]
# Pylint settings
max-args = 7
max-branches = 12
max-returns = 6
max-statements = 50

[tool.ruff.lint.isort]
# Import sorting configuration
known-first-party = ["nhl_scrabble"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

# MyPy configuration
[tool.mypy]
python_version = "3.10"

# Enable strict mode (equivalent to all strict flags)
strict = true

# Additional strict options beyond basic strict mode
warn_unreachable = true
warn_no_return = true
disallow_any_unimported = false  # Too strict for third-party libs
disallow_any_expr = false  # Too strict for practical use
disallow_any_decorated = false  # Too strict for decorators
disallow_any_explicit = false  # Too strict for practical use
disallow_any_generics = true
disallow_subclassing_any = true

# Additional warnings
warn_unused_ignores = true
warn_return_any = true
warn_redundant_casts = true
warn_unused_configs = true

# Strict optional handling
strict_optional = true
strict_equality = true
strict_concatenate = true

# Error reporting
show_error_context = true
show_column_numbers = true
show_error_code_links = true
pretty = true
color_output = true
error_summary = true
show_absolute_path = false

# Import discovery
namespace_packages = true
explicit_package_bases = false  # Avoid duplicate module detection
ignore_missing_imports = true  # Practical for third-party libs without stubs
mypy_path = "src"

# Miscellaneous
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
module = ["tests.*", "conftest"]
disallow_untyped_defs = false
disallow_untyped_decorators = false
warn_return_any = false
check_untyped_defs = false

[[tool.mypy.overrides]]
module = ["nhl_scrabble.cli"]
disallow_untyped_defs = false
disallow_untyped_decorators = false
warn_return_any = false

# Pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=nhl_scrabble",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=html",
    "--cov-report=xml",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
]

# Coverage configuration
[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
precision = 2
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "htmlcov"

# Codespell configuration
[tool.codespell]
# Comprehensive by default (matches ruff's ALL rules philosophy)
check-filenames = true
check-hidden = true

# Skip patterns for non-text files and generated content
skip = '*.lock,*.json,*.min.js,htmlcov/*,.git/*,.tox/*,.venv/*,*.egg-info/*,build/*,dist/*,.pytest_cache/*,.mypy_cache/*,.ruff_cache/*'

# Project-specific ignore words (like ruff's ignore list)
# Add false positives here as they are discovered
# ignore-words-list = 'word1,word2'  # Uncomment and add words when needed

# Consistency settings
count = true
quiet-level = 0  # Show all issues (comprehensive)

# PyMarkdown configuration
[tool.pymarkdown]
# Comprehensive by default (matches ruff's ALL rules philosophy)
# Enable strict mode for maximum rule coverage
mode.strict-config = true

# Plugins configuration - enable all rules by default (like ruff's ALL)
plugins.enabled = [
    "md001",  # MD001 - Heading levels should only increment by one level at a time
    "md002",  # MD002 - First heading should be a top level heading
    "md003",  # MD003 - Heading style
    "md004",  # MD004 - Unordered list style
    "md005",  # MD005 - Inconsistent indentation for list items at the same level
    "md006",  # MD006 - Consider starting bulleted lists at the beginning of the line
    "md007",  # MD007 - Unordered list indentation
    "md009",  # MD009 - Trailing spaces
    "md010",  # MD010 - Hard tabs
    "md011",  # MD011 - Reversed link syntax
    "md012",  # MD012 - Multiple consecutive blank lines
    "md013",  # MD013 - Line length
    "md014",  # MD014 - Dollar signs used before commands without showing output
    "md018",  # MD018 - No space after hash on atx style heading
    "md019",  # MD019 - Multiple spaces after hash on atx style heading
    "md020",  # MD020 - No space inside hashes on closed atx style heading
    "md021",  # MD021 - Multiple spaces inside hashes on closed atx style heading
    "md022",  # MD022 - Headings should be surrounded by blank lines
    "md023",  # MD023 - Headings must start at the beginning of the line
    "md024",  # MD024 - Multiple headings with the same content
    "md025",  # MD025 - Multiple top level headings in the same document
    "md026",  # MD026 - Trailing punctuation in heading
    "md027",  # MD027 - Multiple spaces after blockquote symbol
    "md028",  # MD028 - Blank line inside blockquote
    "md029",  # MD029 - Ordered list item prefix
    "md030",  # MD030 - Spaces after list markers
    "md031",  # MD031 - Fenced code blocks should be surrounded by blank lines
    "md032",  # MD032 - Lists should be surrounded by blank lines
    "md033",  # MD033 - Inline HTML
    "md034",  # MD034 - Bare URL used
    "md035",  # MD035 - Horizontal rule style
    "md036",  # MD036 - Emphasis used instead of a heading
    "md037",  # MD037 - Spaces inside emphasis markers
    "md038",  # MD038 - Spaces inside code span elements
    "md039",  # MD039 - Spaces inside link text
    "md040",  # MD040 - Fenced code blocks should have a language specified
    "md041",  # MD041 - First line in file should be a top level heading
    "md042",  # MD042 - No empty links
    "md043",  # MD043 - Required heading structure
    "md044",  # MD044 - Proper names should have the correct capitalization
    "md045",  # MD045 - Images should have alternate text (alt text)
    "md046",  # MD046 - Code block style
    "md047",  # MD047 - Files should end with a single newline character
    "md048",  # MD048 - Code fence style
    "md049",  # MD049 - Emphasis style should be consistent
    "md050",  # MD050 - Strong style should be consistent
    "md051",  # MD051 - Link fragments should be valid
    "md052",  # MD052 - Reference links and images should use a label that is defined
    "md053",  # MD053 - Link and image reference definitions should be needed
]

# Selective disables (like ruff's ignore list)
plugins.disabled = []

# Rule-specific configuration (like ruff's per-file-ignores)
# MD010 - Hard tabs
# Disabled as it triggers false positives in code blocks (e.g., Makefile snippets)
plugins.md010.enabled = false  # False positives in code blocks requiring tabs

# MD012 - Multiple consecutive blank lines
# Keep enabled to catch actual formatting issues
plugins.md012.enabled = true

# MD029 - Ordered list item prefix
# Disabled as the current documentation style uses continuous numbering (1,2,3)
# which pymarkdown interprets as separate lists that should each start at 1
plugins.md029.enabled = false  # Documentation uses continuous numbering style

# MD013 - Line length
# Disabled for markdown as documentation often has long lines (URLs, examples, tables)
# Ruff's line-length = 100 applies to Python code, not necessarily markdown docs
plugins.md013.enabled = false  # Too strict for documentation with URLs and examples

# MD022 - Headings should be surrounded by blank lines
# Disabled as it's a common pattern in structured documentation
plugins.md022.enabled = false  # Common formatting pattern, would require extensive doc changes

# MD024 - Multiple headings with the same content
# Disabled as it's unavoidable in CHANGELOGs (repeated "Added", "Changed", "Fixed" sections)
plugins.md024.enabled = false  # Common in CHANGELOG files with standard section names

# MD031 - Fenced code blocks should be surrounded by blank lines
# Disabled as it's a very common pattern in existing documentation
plugins.md031.enabled = false  # Common pattern, would require extensive doc changes

# MD032 - Lists should be surrounded by blank lines
# Disabled for compatibility with existing documentation style
plugins.md032.enabled = false  # Common pattern in documentation

# MD033 - Inline HTML (allow for necessary HTML in markdown)
plugins.md033.enabled = false  # Too strict for practical documentation

# MD034 - Bare URL used
# Disabled as bare URLs are common in reference sections
plugins.md034.enabled = false  # Common in documentation reference sections

# MD036 - Emphasis used instead of heading
# Disabled as it's common pattern in structured docs (CHANGELOG, CONTRIBUTING)
plugins.md036.enabled = false  # Common formatting pattern in structured documentation

# MD040 - Fenced code blocks should have language
# Disabled as many code blocks don't need language specification (examples, output, etc.)
plugins.md040.enabled = false  # Too strict, not all code blocks need language specification

# MD041 - First line in file should be a top level heading
plugins.md041.enabled = false  # Too strict, not all markdown files need h1 first

# MD043 - Required heading structure
plugins.md043.enabled = false  # Too strict, overly prescriptive

# UV configuration
[tool.uv]
# Managed by uv for faster dependency resolution
managed = true
package = true

# Compile Python bytecode (.pyc files) for faster imports
compile-bytecode = true

# Link mode for installing packages
link-mode = "copy"

# Strict dependency resolution (like ruff's ALL rules philosophy)
resolution = "highest"  # Use highest compatible versions

# Dependency verification and constraints
constraint-dependencies = []  # Strict dependency constraints
override-dependencies = []    # Override specific dependencies if needed

# Index configuration for strict package resolution
index-strategy = "first-match"  # Use first matching index (deterministic)
keyring-provider = "disabled"   # Disable keyring for reproducibility

# Cache configuration for reproducibility
cache-keys = []  # Custom cache keys for strict caching

# Python preference (prefer system or managed Python)
python-preference = "managed"  # Use managed Python installations

# Enable preview features for latest capabilities
preview = false  # Disable preview features for stability

[tool.uv.sources]
# Optional: Configure custom package sources here if needed
