[tool.uv]
managed = true
package = true
compile-bytecode = true
link-mode = "copy"
resolution = "highest"
constraint-dependencies = []
override-dependencies = []
index-strategy = "first-index"
keyring-provider = "disabled"
cache-keys = []
python-preference = "managed"
preview = false

[tool.uv.sources]

[tool.interrogate]
fail-under = 100.0
verbose = 2
quiet = false
color = true
ignore-init-method = false
ignore-init-module = false
ignore-magic = false
ignore-module = false
ignore-nested-functions = false
ignore-nested-classes = false
ignore-overloaded-functions = false
ignore-private = false
ignore-semiprivate = false
ignore-property-decorators = false
ignore-setters = false
exclude = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
    "tests",
    ".scratch",
]
ext = []
style = "sphinx"
omit-covered-files = false

[tool.deptry]
exclude = [
    "\\.git",
    "\\.tox",
    "\\.venv",
    "venv",
    "build",
    "dist",
    ".*\\.egg-info",
    "__pycache__",
    "tests",
    "scripts",
    "qa",
]
optional_dependencies_dev_groups = [
    "test",
    "lint",
    "type",
    "security",
    "docs",
    "docs-gen",
    "watch",
    "build",
    "publish",
    "tox",
    "dev",
    "branding",
]
ignore = []

[tool.deptry.per_rule_ignores]

[tool.deptry.package_module_name_map]
python-dotenv = "dotenv"
pyyaml = "yaml"

[tool.unimport]
exclude = "\\.git|\\.tox|\\.venv|venv|build|dist|.*\\.egg-info|__pycache__"
ignore_init = true
include_star_import = false
gitignore = true

[tool.pydocstyle]
convention = "pep257"
match = ".*\\.py"
match_dir = "[^\\.].*"
add-ignore = [
    "D100",
    "D101",
    "D102",
    "D103",
    "D104",
    "D105",
    "D106",
    "D107",
    "D202",
    "D203",
    "D213",
    "D413",
]

[tool.vulture]
exclude = [
    ".git",
    ".tox",
    ".venv",
    "venv",
    "build",
    "dist",
    "*.egg-info",
    "__pycache__",
]
ignore_decorators = [
    "@*.command",
    "@*.group",
    "@*.option",
    "@*.argument",
    "@pytest.fixture",
    "@pytest.mark.*",
    "@app.route",
