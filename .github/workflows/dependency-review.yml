name: Dependency Review

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - requirements*.txt

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review Dependency Changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, Python-2.0
          comment-summary-in-pr: always

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Check for security vulnerabilities
        id: audit
        run: |
          pip-audit --desc --format json --output vulnerabilities.json || true
          if [ -f vulnerabilities.json ]; then
            echo "vulns_found=true" >> $GITHUB_OUTPUT
          else
            echo "vulns_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with vulnerability details
        if: steps.audit.outputs.vulns_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let vulns = [];

            try {
              const data = fs.readFileSync('vulnerabilities.json', 'utf8');
              const result = JSON.parse(data);

              // pip-audit JSON format: {"dependencies": [...]}
              if (result.dependencies) {
                for (const dep of result.dependencies) {
                  if (dep.vulns && dep.vulns.length > 0) {
                    for (const vuln of dep.vulns) {
                      vulns.push({
                        name: dep.name,
                        version: dep.version,
                        id: vuln.id,
                        description: vuln.description,
                        fix_versions: vuln.fix_versions ?
                          vuln.fix_versions.join(', ') : 'None available'
                      });
                    }
                  }
                }
              }
            } catch (e) {
              console.log('Error reading vulnerabilities:', e.message);
              return;
            }

            if (vulns.length > 0) {
              let comment = `## 🔒 Dependency Security Review\n\n`;
              const vulnWord = vulns.length === 1 ?
                'vulnerability' : 'vulnerabilities';
              comment += `**Status**: ⚠️ Found ${vulns.length} `;
              comment += `potential ${vulnWord}\n\n`;
              comment += `### Vulnerabilities\n\n`;

              for (const vuln of vulns.slice(0, 10)) {
                comment += `#### ${vuln.name} ${vuln.version}\n`;
                comment += `- **CVE**: ${vuln.id}\n`;
                comment += `- **Description**: ${vuln.description}\n`;
                comment += `- **Fix versions**: ${vuln.fix_versions}\n\n`;
              }

              if (vulns.length > 10) {
                comment += `\n*... and ${vulns.length - 10} more. `;
                comment += `See workflow logs for full details.*\n`;
              }

              comment += `\n---\n`;
              comment += `📋 Please review these vulnerabilities `;
              comment += `and update dependencies as needed.\n`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment
              });
            }

      - name: Summary report
        if: always()
        run: |
          echo "### Dependency Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f vulnerabilities.json ]; then
            echo "✅ Vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
            vuln_count=$(jq -r \
              '.dependencies | map(select(.vulns | length > 0)) | length' \
              vulnerabilities.json 2>/dev/null || echo "0")
            echo "- Vulnerable dependencies found: $vuln_count" \
              >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "License and dependency review completed by" \
            "dependency-review-action." >> $GITHUB_STEP_SUMMARY
