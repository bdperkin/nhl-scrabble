name: Build and Publish Python Package

on:
  push:
    tags:
      - v*  # Trigger on version tags (v1.0.0, v2.1.0, etc.)

permissions:
  contents: write  # For creating GitHub releases
  id-token: write  # For PyPI trusted publishing

jobs:
  build:
    name: Build Python Package
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version detection

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install build tools
        run: |
          uv pip install build twine check-wheel-contents --system

      - name: Build distributions
        run: |
          python -m build --sdist --wheel

      - name: Verify distributions
        run: |
          twine check dist/*
          check-wheel-contents dist/*.whl

      - name: List built packages
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

      - name: Generate hashes for provenance
        id: hash
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

  provenance:
    name: Generate SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
      attestations: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  test-install:
    name: Test Package Installation
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13', '3.14']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Install wheel (Unix)
        if: runner.os != 'Windows'
        run: |
          pip install dist/*.whl
          nhl-scrabble --version

      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install (Get-ChildItem dist/*.whl)
          nhl-scrabble --version

      - name: Test basic functionality
        run: |
          python -c "import nhl_scrabble; print(nhl_scrabble.__version__)"

  publish-testpypi:
    name: Publish to TestPyPI
    needs: test-install
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/nhl-scrabble

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nhl-scrabble

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  generate-changelog:
    name: Generate and Commit Changelog
    needs: publish-pypi
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail release if changelog commit is blocked

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for git-cliff
          ref: main  # Checkout main branch to avoid detached HEAD
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .cliff.toml
          args: --verbose --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit and Push Changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to CHANGELOG.md"
          else
            git commit -m "docs(changelog): Update CHANGELOG.md for ${{ github.ref_name }}"
            git push origin main
          fi

  github-release:
    name: Create GitHub Release
    needs: [generate-changelog, provenance]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch latest with changelog update
          ref: main  # Checkout main branch to get latest changelog

      - name: Pull latest changes
        run: |
          git pull origin main

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract tag annotation
        id: tag_annotation
        run: |
          # Get tag name from ref
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Extract tag annotation (full message)
          # Use -n9999 to get the full annotation (not truncated)
          TAG_MESSAGE=$(
            git tag -l -n9999 "$TAG_NAME" | \
            sed "1s/^$TAG_NAME[[:space:]]*//" || \
            echo ""
          )

          # If empty, provide default message
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE="Release $TAG_NAME"
          fi

          # Save to file for multiline handling
          echo "$TAG_MESSAGE" > tag_annotation.md

      - name: Extract changelog section
        id: extract_changelog
        run: |
          # Extract version section from CHANGELOG.md
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{flag=0} flag" \
            CHANGELOG.md > changelog_section.md || \
            echo "" > changelog_section.md

      - name: Generate release summary
        id: generate_summary
        run: |
          {
            echo "## 📦 Distribution Files"
            echo ""
            echo "This release includes:"
            echo ""
            for file in dist/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(ls -lh "$file" | awk '{print $5}')
                echo "- \`$filename\` ($size)"
              fi
            done
            echo ""
            echo "## 📥 Installation"
            echo ""
            echo "\`\`\`bash"
            echo "# Install from PyPI"
            echo "pip install nhl-scrabble==${{ steps.get_version.outputs.VERSION }}"
            echo ""
            echo "# Upgrade existing installation"
            echo "pip install --upgrade nhl-scrabble"
            echo "\`\`\`"
            echo ""
            echo "## 📚 Documentation"
            echo ""
            REPO="${{ github.repository }}"
            VERSION="${{ steps.get_version.outputs.VERSION }}"
            echo "- [📖 Documentation](https://bdperkin.github.io/nhl-scrabble/)"
            echo "- [📋 CHANGELOG](https://github.com/$REPO/blob/main/CHANGELOG.md)"
            echo "- [📦 PyPI Package](https://pypi.org/project/nhl-scrabble/$VERSION/)"
            echo "- [🐛 Issue Tracker](https://github.com/$REPO/issues)"
            echo "- [💬 Discussions](https://github.com/$REPO/discussions)"
          } > summary.md

      - name: Combine release notes
        run: |
          # Start with tag annotation (primary release notes)
          cat tag_annotation.md > release_notes.md

          # Add separator and detailed changelog if it exists and is non-empty
          if [ -s changelog_section.md ]; then
            echo -e "\n\n---\n\n## Detailed Changelog\n" >> release_notes.md
            cat changelog_section.md >> release_notes.md
          fi

          # Add release summary (distribution files, installation, docs)
          echo -e "\n\n---\n" >> release_notes.md
          cat summary.md >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag_annotation.outputs.tag_name }}
          name: ${{ steps.tag_annotation.outputs.tag_name }}
          files: dist/*
          body_path: release_notes.md
          draft: false
          prerelease: >-
            ${{
              contains(steps.tag_annotation.outputs.tag_name, '-rc') ||
              contains(steps.tag_annotation.outputs.tag_name, '-beta') ||
              contains(steps.tag_annotation.outputs.tag_name, '-alpha')
            }}
          # Use tag annotation + changelog, not auto-generated
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
