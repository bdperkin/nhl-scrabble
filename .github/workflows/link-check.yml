name: Link Check

on:
  # Run on main branch pushes (post-merge validation)
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '.github/workflows/link-check.yml'
      - '.github/markdown-link-check-config.json'

  # Run monthly to catch broken external links
  schedule:
    - cron: '0 0 1 * *'  # First day of every month at midnight UTC

  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for hatch-vcs version detection

      - name: Check links in documentation
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.github/markdown-link-check-config.json'
          use-quiet-mode: 'no'
          use-verbose-mode: 'yes'
          check-modified-files-only: 'yes'  # Only check modified files on push to main
        continue-on-error: true

      - name: Create issue for broken links
        if: failure()
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: 'Broken links detected in documentation'
          content-filepath: '.github/workflows/broken-links-report.md'
          labels: 'documentation,broken-links,automated'
          assignees: ${{ github.repository_owner }}
