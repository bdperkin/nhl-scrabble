name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]" --system

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff lint
        run: ruff check .

      - name: Run mypy
        run: mypy src
        continue-on-error: ${{ matrix.python-version >= '3.12' }}

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}

  tox:
    name: Tox tests with UV
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tox-env:
          - py310
          - py311
          - py312
          - py313
          - ruff-check
          - mypy
          - coverage
          - codespell
          - pymarkdown
          - mdformat
          - pyroma
          - validate-pyproject
          - tox-ini-fmt
          - yamllint
          - flake8
          - isort
          - interrogate
          - absolufy-imports
          - autoflake
          - black
          - docformatter
          - autopep8
          - doc8
          - rstcheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install tox and tox-uv
        run: |
          uv pip install tox tox-uv --system

      - name: Run tox
        run: tox -e ${{ matrix.tox-env }}

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install docformatter and pyroma for pre-commit
        run: |
          uv pip install docformatter pyroma --system

      - name: Run pre-commit with UV
        uses: pre-commit/action@v3.0.0
        env:
          UV_SYSTEM_PYTHON: "1"
