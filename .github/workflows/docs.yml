name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**/*.py'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/**/*.py'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[docs]"

      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html --keep-going

      - name: Check documentation coverage
        run: |
          cd docs
          echo "Checking documentation coverage..."
          sphinx-build -b coverage . _build/coverage

      - name: Test documentation code examples
        run: |
          cd docs
          echo "Testing code examples in documentation..."
          sphinx-build -b doctest . _build/doctest

      - name: Check documentation links
        continue-on-error: true
        run: |
          cd docs
          echo "Checking external links..."
          sphinx-build -b linkcheck . _build/linkcheck

      - name: Upload doctest results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: doctest-results
          path: docs/_build/doctest/

      - name: Upload linkcheck results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linkcheck-results
          path: docs/_build/linkcheck/

      - name: Verify sitemap generated
        run: |
          test -f docs/_build/html/sitemap.xml || (echo "Sitemap not generated!" && exit 1)
          echo "✓ Sitemap.xml generated successfully"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/_build/html'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Use Node.js 24 for all actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
