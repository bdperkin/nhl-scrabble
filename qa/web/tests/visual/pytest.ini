[pytest]
# Playwright visual testing configuration

# Test output
addopts =
    --verbose
    --tb=short
    --strict-markers
    -ra

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    visual: Visual regression test
    cross_browser: Cross-browser visual test
    slow: Slow-running test

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Note: Playwright screenshot comparison settings are configured via
# --expect-timeout and --max-diff-pixel-ratio command-line options
# or in conftest.py using the playwright_expect_timeout fixture
